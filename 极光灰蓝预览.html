<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>极光 · 灰蓝 · 拨云互动</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#eef1f7;}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block;}
  .hint{position:fixed;left:0;right:0;bottom:26px;text-align:center;z-index:2;pointer-events:none;
    color:#4a5478;font-size:13px;letter-spacing:1px;opacity:.8;}
  .title{position:fixed;left:0;right:0;top:44%;text-align:center;z-index:2;pointer-events:none;
    color:#2a3050;font-size:26px;font-weight:800;letter-spacing:2px;text-shadow:0 1px 14px rgba(255,255,255,.6);}
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="title">极光 · 灰蓝</div>
  <div class="hint">移动鼠标 —— 像用手轻轻拨开云雾</div>
<script>
const cv=document.getElementById('c');
let gl=null;try{gl=cv.getContext('webgl',{antialias:false});}catch(e){}
const VS='attribute vec2 p;void main(){gl_Position=vec4(p,0.0,1.0);}';
const FS='precision mediump float;uniform vec2 uRes;uniform float uT;uniform vec3 uA,uB,uAcc1,uAcc2;uniform vec2 uMouse;uniform float uMh;'+
  'float hn(vec2 p){p=fract(p*vec2(123.34,345.45));p+=dot(p,p+34.345);return fract(p.x*p.y);}'+
  'float nz(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.0-2.0*f);'+
  'float a=hn(i),b=hn(i+vec2(1.0,0.0)),c=hn(i+vec2(0.0,1.0)),d=hn(i+vec2(1.0,1.0));'+
  'return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}'+
  'float fbm(vec2 p){float v=0.0,a=0.5;mat2 m=mat2(1.6,1.2,-1.2,1.6);for(int i=0;i<5;i++){v+=a*nz(p);p=m*p;a*=0.5;}return v;}'+
  'void main(){vec2 uv=gl_FragCoord.xy/uRes;float ar=uRes.x/uRes.y;vec3 col=mix(uA,uB,uv.x);'+
  'float t=uT*0.05;vec2 P=uv*vec2(ar,1.0)*1.5;'+
  'vec2 mp=vec2(uMouse.x*ar,uMouse.y)*1.5;vec2 dir=P-mp;float md=length(dir);'+
  'float infl=exp(-md*md*2.2)*uMh;'+                     /* 宽而柔的影响圈 */
  'P+=normalize(dir+vec2(0.0001))*infl*0.30;'+          /* 把雾轻轻推开（拨云） */
  'vec2 perp=vec2(-dir.y,dir.x);P+=perp*infl*0.18;'+    /* 一点旋流，像手划过 */
  'vec2 q=vec2(fbm(P*1.4+vec2(0.0,t)),fbm(P*1.4+vec2(3.0,-t)));float f=fbm(P*2.0+q*1.5+t);'+
  'col=mix(col,uAcc1,smoothstep(0.15,1.0,f)*0.72);col=mix(col,uAcc2,smoothstep(0.55,1.15,f)*0.5);'+
  'float vig=smoothstep(1.7,0.3,length((uv-0.5)*vec2(1.3,1.0)));col=mix(vec3(1.0),col,0.72+0.28*vig);'+
  'gl_FragColor=vec4(col,1.0);}';
function sh(t,s){const o=gl.createShader(t);gl.shaderSource(o,s);gl.compileShader(o);
  if(!gl.getShaderParameter(o,gl.COMPILE_STATUS))console.warn(gl.getShaderInfoLog(o));return o;}
const pr=gl.createProgram();gl.attachShader(pr,sh(gl.VERTEX_SHADER,VS));gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,FS));gl.linkProgram(pr);gl.useProgram(pr);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const aP=gl.getAttribLocation(pr,'p');gl.enableVertexAttribArray(aP);gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);
const U=n=>gl.getUniformLocation(pr,n);
const uRes=U('uRes'),uT=U('uT'),uA=U('uA'),uB=U('uB'),uAcc1=U('uAcc1'),uAcc2=U('uAcc2'),uMouse=U('uMouse'),uMh=U('uMh');
// 灰蓝配色
gl.uniform3f(uA,0.97,0.98,1.0);gl.uniform3f(uB,0.90,0.92,0.97);
gl.uniform3f(uAcc1,0.60,0.70,0.90);gl.uniform3f(uAcc2,0.76,0.84,0.96);
let W,H;function resize(){const dpr=Math.min(devicePixelRatio||1,1.5);W=cv.width=Math.floor(innerWidth*dpr);H=cv.height=Math.floor(innerHeight*dpr);gl.viewport(0,0,W,H);}
resize();addEventListener('resize',resize);
let MX=innerWidth/2,MY=innerHeight/2,SX=MX,SY=MY,ht=0,hv=0;
addEventListener('mousemove',e=>{MX=e.clientX;MY=e.clientY;ht=1;});
addEventListener('mouseout',e=>{if(!e.relatedTarget)ht=0;});
const t0=performance.now();
function frame(now){
  SX+=(MX-SX)*0.07;SY+=(MY-SY)*0.07;hv+=(ht-hv)*0.05;   /* 惯性平滑，手感柔和 */
  gl.uniform2f(uRes,W,H);gl.uniform1f(uT,(now-t0)/1000);
  gl.uniform2f(uMouse,SX/innerWidth,1.0-SY/innerHeight);gl.uniform1f(uMh,hv);
  gl.drawArrays(gl.TRIANGLES,0,3);requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
