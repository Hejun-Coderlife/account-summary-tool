<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>动态表头 · 10 个多彩科技风</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    background:#0b0f1c;color:#dbe6f5;min-height:100vh;padding:24px 22px 48px;-webkit-font-smoothing:antialiased;}
  h1{font-size:20px;font-weight:800;letter-spacing:1px;text-align:center;color:#cfe0ff;}
  .sub{text-align:center;color:#8090b5;font-size:13px;margin:8px 0 24px;}
  .list{display:flex;flex-direction:column;gap:14px;max-width:1100px;margin:0 auto;}
  .card{border-radius:12px;overflow:hidden;border:1px solid #1e2947;background:#0a0e1c;box-shadow:0 10px 24px rgba(0,0,0,.4);}
  .bar{position:relative;overflow:hidden;height:76px;background:#0f1533;}
  .bar canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .bar .fg{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;gap:13px;pointer-events:none;}
  .bar .fg svg{width:32px;height:32px;flex:none;filter:drop-shadow(0 2px 7px rgba(0,0,0,.5));}
  .bar .fg span{font-size:20px;font-weight:700;letter-spacing:1.2px;color:#f7f9ff;text-shadow:0 1px 12px rgba(0,0,0,.45);}
  .bar .err{position:absolute;inset:0;z-index:3;display:flex;align-items:center;justify-content:center;color:#ff6b7a;font-size:12px;white-space:pre-wrap;padding:8px;text-align:center;background:#0a0e1c;}
  .label{display:flex;align-items:baseline;gap:10px;padding:9px 16px;font-size:13px;}
  .label .n{font-weight:700;color:#e7f0ff;}
  .label .d{color:#8496b8;font-size:12px;}
  .hint{text-align:center;color:#66799b;font-size:12px;margin-top:26px;}
  .hint b{color:#9fc4f0;}
</style>
</head>
<body>
  <h1>动态表头 · 10 个多彩科技风</h1>
  <div class="sub">每条一套配色、一种动效，真实表头尺寸（含图标+标题）。选好告诉我「要表头几」，我就换上去。</div>
  <div class="list" id="list"></div>
  <div class="hint">全部 <b>WebGL / GPU</b> 手写着色器、面积小省性能 · 仅预览，<b>不会改动你的网站</b></div>

<script>
const LOGO='<svg viewBox="0 0 36 36" fill="none"><defs><linearGradient id="lg" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#eaf2ff"/><stop offset="1" stop-color="#cdd9ff"/></linearGradient></defs><rect x="4" y="21" width="6.5" height="11" rx="2.2" fill="url(#lg)"/><rect x="14.75" y="12" width="6.5" height="20" rx="2.2" fill="url(#lg)"/><rect x="25.5" y="5" width="6.5" height="27" rx="2.2" fill="url(#lg)"/><path d="M7.25 16 L18 7.5 L28.75 3" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" opacity=".85"/></svg>';

const H1='float h1(float n){return fract(sin(n)*43758.5453);}';
const H2='float h2(vec2 p){return fract(sin(dot(p,vec2(41.3,289.1)))*43758.5453);}';
const NOISE='float hn(vec2 p){p=fract(p*vec2(123.34,345.45));p+=dot(p,p+34.345);return fract(p.x*p.y);}'+
  'float nz(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.0-2.0*f);'+
  'float a=hn(i),b=hn(i+vec2(1.0,0.0)),c=hn(i+vec2(0.0,1.0)),d=hn(i+vec2(1.0,1.0));'+
  'return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}'+
  'float fbm(vec2 p){float v=0.0,a=0.5;mat2 m=mat2(1.6,1.2,-1.2,1.6);for(int i=0;i<4;i++){v+=a*nz(p);p=m*p;a*=0.5;}return v;}';
// 每条自己的底色渐变
function B(a,b){return 'vec2 uv=gl_FragCoord.xy/uRes;float ar=uRes.x/uRes.y;vec3 col=mix(vec3('+a+'),vec3('+b+'),uv.x);';}

const SCENES=[
  {name:'流光扫描',desc:'冷光横扫 · 蓝',helpers:'',body:B('0.055,0.08,0.21','0.10,0.13,0.34')+
    'float sw=smoothstep(0.14,0.0,abs(fract(uT*0.12)-uv.x));col+=vec3(0.22,0.52,0.95)*sw*0.6;'+
    'float sw2=smoothstep(0.08,0.0,abs(fract(uT*0.12+0.5)-uv.x));col+=vec3(0.45,0.68,1.0)*sw2*0.35;'},
  {name:'科技网格',desc:'网格平移+交点 · 青绿',helpers:'',body:B('0.04,0.13,0.14','0.06,0.20,0.22')+
    'vec2 g=vec2(uv.x*ar,uv.y)*9.0;g.x+=uT*0.9;vec2 e=abs(fract(g)-0.5);'+
    'float ln=smoothstep(0.5,0.45,max(e.x,e.y));col+=vec3(0.18,0.85,0.70)*ln*0.45;'+
    'float dt=smoothstep(0.5,0.46,length(fract(g)-0.5));col+=vec3(0.4,1.0,0.85)*dt*0.18;'},
  {name:'电路脉冲',desc:'走线+光点流动 · 紫',helpers:H1,body:B('0.12,0.05,0.20','0.20,0.08,0.30')+
    'vec2 g=vec2(uv.x*ar,uv.y)*7.0;vec2 f=abs(fract(g)-0.5);'+
    'float ln=smoothstep(0.5,0.45,max(f.x,f.y));col+=vec3(0.42,0.22,0.58)*ln*0.55;'+
    'float onH=smoothstep(0.5,0.45,f.y);float px=fract(g.x-uT*2.0+h1(floor(g.y))*9.0);'+
    'float pulse=smoothstep(0.1,0.0,px)*onH;col+=vec3(0.82,0.42,1.0)*pulse;'},
  {name:'光速流线',desc:'横向拉丝 · 橙',helpers:H1,body:B('0.14,0.09,0.05','0.23,0.13,0.06')+
    'float rows=13.0;float ry=floor(uv.y*rows);float sp=0.25+h1(ry)*0.5;'+
    'float x=fract(uv.x-uT*sp+h1(ry)*10.0);float st=smoothstep(0.0,0.015,x)*smoothstep(0.14,0.0,x);'+
    'col+=vec3(1.0,0.62,0.18)*st*0.95;'},
  {name:'流彩极光',desc:'柔和极光流动 · 粉紫',helpers:NOISE,body:B('0.14,0.05,0.16','0.22,0.08,0.26')+
    'float t=uT*0.08;vec2 P=uv*vec2(ar,1.0);'+
    'vec2 q=vec2(fbm(P*2.0+vec2(0.0,t)),fbm(P*2.0+vec2(3.0,-t)));'+
    'float f=fbm(P*3.0+q*1.5+t);'+
    'col=mix(col,vec3(1.0,0.40,0.72),smoothstep(0.2,1.0,f)*0.6);'+
    'col=mix(col,vec3(0.55,0.35,0.95),smoothstep(0.6,1.1,f)*0.45);'},
  {name:'数据瀑布',desc:'竖向数据流下落 · 绿',helpers:H1,body:B('0.03,0.12,0.07','0.05,0.18,0.10')+
    'float cols=52.0;float cx=floor(uv.x*cols);float sp=0.3+h1(cx)*0.7;'+
    'float y=fract(uv.y+uT*sp+h1(cx)*10.0);float seg=smoothstep(0.0,0.05,y)*smoothstep(0.7,0.0,y);'+
    'col+=vec3(0.25,1.0,0.50)*seg*0.8;'},
  {name:'声波脉冲',desc:'波形上下起伏 · 青',helpers:'',body:B('0.03,0.11,0.16','0.05,0.17,0.24')+
    'float w=0.5+0.16*sin(uv.x*ar*5.0-uT*2.5)+0.06*sin(uv.x*ar*11.0+uT*1.7);'+
    'float glow=smoothstep(0.20,0.0,abs(uv.y-w));col+=vec3(0.1,0.5,0.72)*glow*0.3;'+
    'float ln=smoothstep(0.04,0.0,abs(uv.y-w));col+=vec3(0.3,0.9,1.0)*ln*0.9;'},
  {name:'光带斜纹',desc:'斜向光带缓移 · 玫红',helpers:'',body:B('0.16,0.05,0.09','0.24,0.07,0.13')+
    'float s=fract((uv.x*ar+uv.y)*3.5-uT*0.7);float band=smoothstep(0.5,0.15,abs(s-0.5));'+
    'col+=vec3(1.0,0.35,0.48)*band*0.34;'},
  {name:'星点闪烁',desc:'点阵星光呼吸 · 金',helpers:H2,body:B('0.10,0.09,0.05','0.16,0.14,0.07')+
    'vec2 g=vec2(uv.x*ar,uv.y)*14.0;vec2 id=floor(g);vec2 f=fract(g)-0.5;'+
    'float r=h2(id);float tw=0.5+0.5*sin(uT*2.0+r*30.0);'+
    'float star=smoothstep(0.14,0.0,length(f))*step(0.62,r)*tw;col+=vec3(1.0,0.82,0.35)*star*0.95;'},
  {name:'蜂巢脉动',desc:'六边形网格光波 · 靛紫',helpers:'',body:B('0.08,0.07,0.22','0.16,0.10,0.34')+
    'vec2 P=vec2(uv.x*ar,uv.y)*5.0;vec2 s=vec2(1.0,1.7320508);vec2 hs=0.5*s;'+
    'vec2 a=mod(P,s)-hs;vec2 b=mod(P+hs,s)-hs;vec2 gv=dot(a,a)<dot(b,b)?a:b;vec2 idh=P-gv;'+
    'float hd=max(abs(gv.x)*0.866+abs(gv.y)*0.5,abs(gv.y));float pulse=0.5+0.5*sin(uT*2.0-idh.x*0.6);'+
    'float edge=smoothstep(0.46,0.5,hd);col+=vec3(0.55,0.45,1.0)*edge*(0.3+0.5*pulse);'},
];

function sh(gl,t,src){const o=gl.createShader(t);gl.shaderSource(o,src);gl.compileShader(o);
  if(!gl.getShaderParameter(o,gl.COMPILE_STATUS))throw new Error((t===gl.VERTEX_SHADER?'顶点':'片元')+'着色器编译失败:\n'+gl.getShaderInfoLog(o));return o;}
function prog(gl,vs,fs){const p=gl.createProgram();gl.attachShader(p,sh(gl,gl.VERTEX_SHADER,vs));gl.attachShader(p,sh(gl,gl.FRAGMENT_SHADER,fs));gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS))throw new Error('着色器链接失败:\n'+gl.getProgramInfoLog(p));return p;}
function sizer(cv,gl){return function(){const dpr=Math.min(devicePixelRatio||1,1.5);
  const w=Math.max(1,Math.floor(cv.clientWidth*dpr)),h=Math.max(1,Math.floor(cv.clientHeight*dpr));
  if(cv.width!==w||cv.height!==h){cv.width=w;cv.height=h;}gl.viewport(0,0,cv.width,cv.height);};}
function runFS(cv,helpers,body){
  let gl;try{gl=cv.getContext('webgl',{alpha:false,antialias:false})||cv.getContext('experimental-webgl');}catch(e){}
  if(!gl)throw new Error('浏览器不支持 WebGL');
  const vs='attribute vec2 p;void main(){gl_Position=vec4(p,0.0,1.0);}';
  const fs='precision mediump float;uniform vec2 uRes;uniform float uT;\n'+helpers+'\nvoid main(){'+body+'gl_FragColor=vec4(col,1.0);}';
  const pr=prog(gl,vs,fs);
  const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
  const aP=gl.getAttribLocation(pr,'p'),uRes=gl.getUniformLocation(pr,'uRes'),uT=gl.getUniformLocation(pr,'uT');
  const resize=sizer(cv,gl);resize();addEventListener('resize',resize);const t0=performance.now();
  function loop(now){resize();gl.useProgram(pr);gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.enableVertexAttribArray(aP);gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);
    gl.uniform2f(uRes,cv.width,cv.height);gl.uniform1f(uT,(now-t0)/1000);
    gl.drawArrays(gl.TRIANGLES,0,3);requestAnimationFrame(loop);}
  requestAnimationFrame(loop);return resize;
}

const list=document.getElementById('list');
SCENES.forEach((s,idx)=>{
  const n=idx+1;
  const card=document.createElement('div');card.className='card';
  card.innerHTML='<div class="bar"><canvas></canvas><div class="fg">'+LOGO+'<span>客户账目汇总工具</span></div></div>'+
    '<div class="label"><span class="n">表头 '+n+' · '+s.name+'</span><span class="d">'+s.desc+'</span></div>';
  list.appendChild(card);
  const cv=card.querySelector('canvas');
  try{runFS(cv,s.helpers,s.body);}
  catch(err){const d=document.createElement('div');d.className='err';
    d.textContent='表头'+n+' 渲染失败：\n'+((err&&err.message)||err);card.querySelector('.bar').appendChild(d);console.error('scene',n,err);}
});
</script>
</body>
</html>
