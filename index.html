<script src="xlsx.full.min.js"></script>
<script src="html2canvas.min.js"></script>
<script src="jszip.min.js"></script>
<style>
  :root{
    --bg:#f5f7fc; --panel:#ffffff; --ink:#1f2540; --muted:#6b7395;
    --line:#e0e5ee; --brand:#0284c7; --brand-d:#334155; --accent:#0ea5e9;
    --in:#0e9c6d; --in-bg:#e9faf3; --out:#e5484d; --out-bg:#fdecec;
    --ac:#4457c9; --ac-bg:#eaedfb;
    --shadow:0 1px 3px rgba(30,40,70,.05),0 14px 36px rgba(51,65,85,.10);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh;
    background:radial-gradient(125% 90% at 50% 0%, #eef2f8 0%, #e6ebf4 65%, #dfe5f0 100%);background-attachment:fixed;}
  .cornerL,.cornerR{position:fixed;bottom:0;z-index:-1;pointer-events:none;width:0;height:0;}
  .cornerL{left:0;} .cornerR{right:0;}
  .cg{position:absolute;transform-origin:center;display:block;opacity:.5;}
  .cg.big{width:380px;height:380px;bottom:-190px;animation:gspin 16s linear infinite;}
  .cg.small{width:168px;height:168px;bottom:116px;animation:gspin 9s linear infinite reverse;}
  .cornerL .cg.big{left:-190px;} .cornerL .cg.small{left:118px;}
  .cornerR .cg.big{right:-190px;} .cornerR .cg.small{right:118px;}
  @media(max-width:640px){.cg.big{width:280px;height:280px;bottom:-140px;}.cornerL .cg.big{left:-140px;}.cornerR .cg.big{right:-140px;}.cg.small{width:120px;height:120px;}}
  header.top{position:relative;overflow:hidden;color:#1f2540;padding:22px 28px 22px;text-align:center;background:#eaeef4;
    box-shadow:0 8px 26px rgba(51,65,85,.12);}
  #hdr{position:absolute;inset:0;width:100%;height:100%;z-index:0;display:block;}
  header.top::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;z-index:1;
    background:linear-gradient(90deg,rgba(120,150,220,0),rgba(120,150,220,.55),rgba(120,150,220,0));}
  .brand{position:relative;z-index:2;display:inline-flex;align-items:center;justify-content:center;gap:13px;}
  .logo{width:50px;height:50px;flex:none;display:block;filter:drop-shadow(0 2px 7px rgba(51,90,150,.35));animation:logoPulse 3.4s ease-in-out infinite;}
  @keyframes logoPulse{0%,100%{filter:drop-shadow(0 2px 5px rgba(99,102,241,.3));}50%{filter:drop-shadow(0 2px 9px rgba(80,110,200,.5));}}
  .gear{transform-box:fill-box;transform-origin:center;}
  .gspin{animation:gspin 9s linear infinite;}
  .gspinr{animation:gspin 6s linear infinite reverse;}
  @keyframes gspin{to{transform:rotate(360deg);}}
  .ttl{text-align:left;line-height:1;}
  .brand h1{margin:0;font-size:26px;font-weight:800;letter-spacing:2px;line-height:1.1;
    background:linear-gradient(92deg,#334155,#475569,#0284c7);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 1px 8px rgba(51,65,85,.22));}
  .tsub{font-size:10px;letter-spacing:4px;color:#6a7690;margin-top:6px;font-weight:700;}
  .wrap{max-width:1180px;margin:0 auto;padding:24px 20px 90px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:20px 22px;margin-bottom:20px;}
  .card h2{margin:0 0 4px;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
  .card .hint{color:var(--muted);font-size:12.5px;margin:0 0 16px;}
  .step{display:inline-flex;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#475569,#0ea5e9);color:#fff;
    font-size:12px;align-items:center;justify-content:center;font-weight:600;box-shadow:0 3px 8px rgba(51,65,85,.30);}
  .drop-row{display:grid;grid-template-columns:1fr 1fr 1fr 0.8fr;gap:14px;align-items:stretch;}
  @media(max-width:940px){.drop-row{grid-template-columns:1fr 1fr;}}
  @media(max-width:560px){.drop-row{grid-template-columns:1fr;}}
  .drop{border:1.5px solid var(--line);border-radius:12px;padding:22px;text-align:center;cursor:pointer;transition:.15s;background:#f5f7fb;}
  .drop:hover{border-color:var(--brand);background:#eef3fb;}
  .drop.master{padding:18px 14px;background:#f5f7fb;}
  .drop .tag{display:inline-block;font-size:12px;font-weight:600;padding:2px 10px;border-radius:999px;margin-bottom:8px;}
  .drop.income .tag{background:#e6edf6;color:#334155;}
  .drop.accept .tag{background:var(--ac-bg);color:var(--ac);}
  .drop.expense .tag{background:#fbeede;color:#b45309;}
  .drop.master .tag{background:#e0f0fb;color:#0284c7;}
  .drop-ico{width:32px;height:32px;display:block;margin:2px auto 10px;}
  .drop.income .drop-ico{color:#334155;}
  .drop.accept .drop-ico{color:var(--ac);}
  .drop.expense .drop-ico{color:#b45309;}
  .drop.master .drop-ico{color:#0284c7;width:28px;height:28px;}
  .act{font-size:13.5px;font-weight:600;color:var(--ink);}
  .drop.master .act{font-size:12px;}
  .tpl-link{display:inline-block;margin-top:10px;font-size:12.5px;color:var(--brand);border:1px solid var(--line);
    background:#fff;border-radius:7px;padding:4px 12px;cursor:pointer;}
  .tpl-link:hover{border-color:var(--brand);background:#f0f6ff;}
  .filelist{margin-top:14px;display:flex;flex-direction:column;gap:10px;}
  .fitem{border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:#fbfcff;}
  .fitem .fhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .fitem .fname{font-weight:600;font-size:13.5px;flex:1;min-width:180px;word-break:break-all;}
  .badge{font-size:11px;padding:1px 8px;border-radius:999px;font-weight:600;}
  .badge.in{background:var(--in-bg);color:var(--in);}
  .badge.ac{background:var(--ac-bg);color:var(--ac);}
  .badge.out{background:var(--out-bg);color:var(--out);}
  .badge.rows{background:#eef2ff;color:#4338ca;}
  .rm{background:none;border:none;color:var(--out);cursor:pointer;font-size:12px;font-weight:600;padding:4px;}
  .btn{border:none;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:7px;}
  .bico{width:16px;height:16px;flex:none;}
  .btn.primary{background:linear-gradient(135deg,#475569 0%,#0ea5e9 100%);color:#fff;box-shadow:0 6px 18px rgba(51,65,85,.30);}
  .btn.primary:hover{filter:brightness(1.06);box-shadow:0 9px 24px rgba(79,70,229,.4);}
  .btn.primary:disabled{background:linear-gradient(135deg,#8f96ad,#9aa2b8);color:#f2f4fa;box-shadow:none;filter:none;cursor:not-allowed;}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink);}
  .btn.ghost:hover{border-color:var(--brand);color:var(--brand);}
  .btn.data{background:#edf5fd;border:1px solid #cfe4f5;color:#0369a1;}
  .btn.data:hover{border-color:#0284c7;background:#e0eefb;}
  .btn.img{background:#e9f7f3;border:1px solid #cbe8e1;color:#0f766e;}
  .btn.img:hover{border-color:#0d9488;background:#dbf1ea;}
  .btn.sm{padding:5px 12px;font-size:12.5px;border-radius:7px;}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .toolbar .spacer{flex:1;}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
  .stat{border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:#fbfcff;}
  .stat .k{font-size:12px;color:var(--muted);}
  .stat .v{font-size:20px;font-weight:700;margin-top:2px;}
  .stat.in .v{color:var(--in);} .stat.out .v{color:var(--out);} .stat.ac .v{color:var(--ac);}
  .tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);overflow-x:auto;}
  .tab{padding:9px 14px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;font-weight:600;}
  .tab.active{color:var(--brand);border-bottom-color:var(--brand);}
  .search{padding:7px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;width:220px;max-width:100%;font-family:inherit;}
  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px;margin-top:14px;}
  .tablewrap table thead tr:first-child th:first-child{border-top-left-radius:9px;}
  .tablewrap table thead tr:first-child th:last-child{border-top-right-radius:9px;}
  .tablewrap table tbody tr:last-child td:first-child{border-bottom-left-radius:9px;}
  .tablewrap table tbody tr:last-child td:last-child{border-bottom-right-radius:9px;}
  table{border-collapse:collapse;width:100%;font-size:13px;}
  th,td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap;}
  th{background:#f8fafc;font-weight:600;color:#475569;position:sticky;top:0;cursor:pointer;user-select:none;}
  tbody tr:hover{background:#f8fbff;}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;}
  td.ctr,th.ctr{text-align:center;font-variant-numeric:tabular-nums;}
  .pos{color:var(--in);font-weight:600;} .neg{color:var(--out);font-weight:600;} .acc{color:var(--ac);font-weight:600;}
  tr.total-row td{font-weight:700;background:#f1f5f9;border-top:1px solid var(--line);}
  tr.total-row td.pos{color:var(--in);} tr.total-row td.neg{color:var(--out);}
  .cust-link{color:var(--brand);cursor:pointer;text-decoration:none;font-weight:600;}
  .cust-link:hover{text-decoration:underline;}
  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;}
  .pill{font-size:11px;padding:1px 7px;border-radius:999px;font-weight:600;}
  .pill.in{background:var(--in-bg);color:var(--in);} .pill.out{background:var(--out-bg);color:var(--out);}
  #panelBody{padding-top:2px;}
  .cust-controls{max-width:860px;margin:6px auto 0;display:flex;justify-content:flex-end;gap:14px;font-size:13px;color:var(--muted);}
  .cust-controls label{display:inline-flex;align-items:center;gap:5px;cursor:pointer;user-select:none;}
  .statement{max-width:860px;margin:12px auto 0;padding:28px 36px 22px;background:#fff;border:1px solid var(--line);border-radius:14px;}
  .st-title{text-align:center;font-size:19px;font-weight:700;letter-spacing:.5px;margin:6px 0 2px;}
  .st-sub{text-align:center;font-size:13.5px;color:var(--muted);margin:0 0 14px;}
  .st-foot{text-align:right;font-size:12.5px;color:var(--muted);margin:10px 4px 0;}
  .capturing{box-shadow:none!important;}
  .capturing .tablewrap{overflow:visible!important;}
  .capturing.statement,.capturing .statement{max-width:none!important;width:max-content!important;}
  .warn{border:1px solid #fca5a5;background:#fef2f2;border-left:4px solid var(--out);border-radius:10px;padding:14px 18px;margin-bottom:16px;}
  .warn.ok{border-color:#86efac;background:#f0fdf4;border-left-color:var(--in);}
  .warn h4{margin:0 0 6px;color:#b91c1c;font-size:14px;}
  .warn.ok h4{color:#15803d;}
  .warn .names{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;max-height:180px;overflow:auto;}
  .warn .chip{background:#fff;border:1px solid #fca5a5;color:#b91c1c;border-radius:6px;padding:2px 9px;font-size:12.5px;}
  .warn-how{background:#fff;border:1px solid #fbcccc;border-radius:9px;padding:11px 13px;margin:12px 0;font-size:13px;color:#7f1d1d;line-height:1.75;}
  .warn-how>b{display:block;margin-bottom:5px;color:#b91c1c;}
  .warn-how>div{margin-top:5px;}
  .warn-how b{color:#b91c1c;}
  .foot{text-align:center;color:#8891ab;font-size:12px;margin-top:20px;}
  .hidden{display:none;}
</style>
</head>

function cleanNum(v){if(v==null||v==='')return 0;if(typeof v==='number')return v;

function cleanName(v){if(v==null)return '';return String(v).replace(/\s+/g,'').trim();}

function escapeAttr(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');}

function analyzeSheet(aoa){
  let hr=-1;
  for(let r=0;r<Math.min(aoa.length,10);r++){const row=aoa[r]||[];
    const ne=row.filter(c=>c!=null&&String(c).trim()!=='').length;
    if(ne>=2 && findCol(row,NAME_KEYS)>=0 && findCol(row,AMT_KEYS)>=0){hr=r;break;}}
  if(hr<0)for(let r=0;r<Math.min(aoa.length,10);r++){const row=aoa[r]||[];if(row.filter(c=>c!=null&&String(c).trim()!=='').length>=2){hr=r;break;}}
  if(hr<0)return null;
  const H=(aoa[hr]||[]).map(h=>h==null?'':String(h));
  return{headerRow:hr,headers:H,nameCol:findCol(H,NAME_KEYS),amountCol:findCol(H,AMT_KEYS),
    yearCol:findCol(H,YEAR_KEYS),monthCol:findCol(H,MONTH_KEYS),dateCol:findCol(H,DAY_KEYS),
    remarkCol:findCol(H,REMARK_KEYS),dataRows:aoa.length-hr-1};
}
function pickBestSheet(wb){let best=null,bs=-1;

    const a=analyzeSheet(aoa);if(!a)continue;let sc=0;if(a.nameCol>=0)sc+=100;if(a.amountCol>=0)sc+=100;sc+=Math.min(a.dataRows,500)/10;
    if(sc>bs){bs=sc;best={name,analysis:a};}}
  return best;}
function buildDate(row,a){const pad=v=>String(v).padStart(2,'0');
  if(a.dateCol>=0 && row[a.dateCol] instanceof Date){const d=row[a.dateCol];return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;}
  if(a.dateCol>=0 && a.yearCol<0){const s=String(row[a.dateCol]==null?'':row[a.dateCol]).trim();   // 承兑等把整日期放在一列的情况
    const m=s.match(/(\d{4})[.\-\/年](\d{1,2})[.\-\/月](\d{1,2})/);if(m)return `${+m[1]}年${+m[2]}月${+m[3]}日`;}
  const num=x=>{const n=parseInt(String(x).replace(/[^0-9]/g,''),10);return isNaN(n)?null:n;};
  const y=a.yearCol>=0?num(row[a.yearCol]):null,m=a.monthCol>=0?num(row[a.monthCol]):null,d=a.dateCol>=0?num(row[a.dateCol]):null;
  if(y&&m&&d)return `${y}年${m}月${d}日`;
  if(m&&d)return `${m}月${d}日`;
  if(d)return `${d}`;

function extractRows(entry){

};
const CATNAME={income:'进账·收入',expense:'开票金额',accept:'电子承兑',master:'客户名汇总'};
/* 电子承兑：直接读承兑明细原文件，按列位置取 D列(索引3)=金额、E列(索引4)=客户名、B列(索引1)=日期、C列(索引2)=承兑号(作备注) */
const AC_NAME_C=4,AC_AMT_C=3,AC_DATE_C=1,AC_NO_C=2;
function pickAcceptSheet(wb){let best=null,bc=-1;
  for(const sn of wb.SheetNames){const aoa=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
    let cnt=0;for(let r=1;r<aoa.length;r++){const row=aoa[r]||[];if(cleanName(row[AC_NAME_C])&&cleanNum(row[AC_AMT_C])>0)cnt++;}
    if(cnt>bc){bc=cnt;best={name:sn,rows:cnt};}}
  return best;}
function normH(s){return String(s==null?'':s).replace(/[\s　]/g,'').replace(/（/g,'(').replace(/）/g,')');}
function headerRowOf(aoa){for(let r=0;r<Math.min(aoa.length,12);r++){const row=aoa[r]||[];
  if(row.filter(c=>String(c).trim()!=='').length>=2)return row;}return [];}
function trimTail(a){a=a.slice();while(a.length&&String(a[a.length-1]).trim()==='')a.pop();return a;}
function validateFile(wb,cat){
  if(cat==='accept'){   // 承兑原文件：只要有一行 E列客户名+D列金额 就通过
    for(const sn of wb.SheetNames){const aoa=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
      for(let r=1;r<aoa.length;r++){const row=aoa[r]||[];if(cleanName(row[AC_NAME_C])&&cleanNum(row[AC_AMT_C])>0)return {ok:true};}}
    return {ok:false,msg:'「电子承兑」文件里没找到有效数据行。\n\n本工具直接读承兑明细原文件：第 D 列（收入金额）为金额、第 E 列（收入客户）为客户名。\n请确认上传的是承兑明细表，或点「下载模版」看示例格式。'};
  }
  const exp=TEMPLATES[cat],expN=exp.map(normH);let firstFound=null;
  for(const sn of wb.SheetNames){
    const aoa=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
    const got=trimTail(headerRowOf(aoa)).map(c=>String(c==null?'':c).trim());
    if(firstFound===null)firstFound=got;
    const gotN=got.map(normH);
    if(gotN.length===expN.length&&expN.every((h,i)=>h===gotN[i]))return {ok:true};
  }
  const found=(firstFound&&firstFound.length)?firstFound.join(' | '):'（未找到表头/为空）';
  return {ok:false,msg:`「${CATNAME[cat]}」表格格式不符，已拒绝上传。\n\n需要的表头（第一行）应为：\n${exp.join(' | ')}\n\n你的文件表头是：\n${found}\n\n请点该卡片的「下载模版」，按模板的表头填写后再上传。`};
}
function handleFiles(fileList,category){
  Array.from(fileList).forEach(file=>{const reader=new FileReader();
    reader.onload=e=>{let wb;try{wb=XLSX.read(e.target.result,{type:'array',cellDates:true});}catch(err){alert('无法读取文件：'+file.name+'\n'+err);return;}
      const v=validateFile(wb,category);if(!v.ok){alert(v.msg);return;}
      if(category==='accept'){const p=pickAcceptSheet(wb);
        const entry={id:'f'+Math.random().toString(36).slice(2,9),name:file.name,category,wb,
          selectedSheet:p?p.name:wb.SheetNames[0],
          analysis:{headerRow:0,headers:[],nameCol:AC_NAME_C,amountCol:AC_AMT_C,yearCol:-1,monthCol:-1,dateCol:AC_DATE_C,remarkCol:AC_NO_C,dataRows:p?p.rows:0}};
        store.accept.push(entry);renderFileList();updateGenState();return;}
      const picked=pickBestSheet(wb);
      const entry={id:'f'+Math.random().toString(36).slice(2,9),name:file.name,category,wb,
        selectedSheet:picked?picked.name:wb.SheetNames[0],analysis:picked?picked.analysis:null};
      if(!entry.analysis){const aoa=XLSX.utils.sheet_to_json(wb.Sheets[entry.selectedSheet],{header:1,defval:''});
        entry.analysis=analyzeSheet(aoa)||{headerRow:0,headers:aoa[0]||[],nameCol:-1,amountCol:-1,yearCol:-1,monthCol:-1,dateCol:-1,remarkCol:-1,dataRows:0};}
      store[category].push(entry);renderFileList();updateGenState();};
    reader.readAsArrayBuffer(file);});}
function renderFileList(){
  const box=document.getElementById('fileList');const all=[...store.income,...store.accept,...store.expense];
  if(all.length===0){box.innerHTML='';return;}
  box.innerHTML=all.map(en=>{const a=en.analysis;
    const badge=en.category==='income'?'<span class="badge in">进账</span>'
      :en.category==='accept'?'<span class="badge ac">电子承兑</span>':'<span class="badge out">开票</span>';
    const ok=a.nameCol>=0&&a.amountCol>=0;
    const st=ok?'<span class="badge" style="background:#dcfce7;color:#15803d;">✓ 已识别</span>'
      :'<span class="badge" style="background:#fef3c7;color:#b45309;">⚠ 未识别客户名/金额列，请用模版格式</span>';
    return `<div class="fitem"><div class="fhead">${badge}
      <span class="fname">${escapeHtml(en.name)}</span>
      <span class="badge rows">${a.dataRows||0} 行数据</span>${st}
      <button class="rm" onclick="removeFile('${en.id}')">移除</button></div></div>`;}).join('');}
window.removeFile=id=>{store.income=store.income.filter(e=>e.id!==id);store.accept=store.accept.filter(e=>e.id!==id);store.expense=store.expense.filter(e=>e.id!==id);renderFileList();updateGenState();};
function updateGenState(){
  const all=[...store.income,...store.accept,...store.expense];
  const ok=all.length>0 && all.every(e=>e.analysis.nameCol>=0&&e.analysis.amountCol>=0);
  document.getElementById('genBtn').disabled=!ok;
  const h=document.getElementById('genHint');
  if(all.length===0)h.textContent='请先上传至少一个表格。';
  else if(!ok)h.textContent='部分文件未能识别「客户名」或「金额」列，请用「下载模版」的格式。';
  else h.textContent='';}

/* ============ 客户名汇总（标准名单） ============ */
function parseMaster(wb){
  const KW=['名称','标准','客户','单位','户名','名单'];const std=new Set();
  wb.SheetNames.forEach(sn=>{const aoa=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
    let hr=-1;for(let r=0;r<Math.min(aoa.length,8);r++){const row=aoa[r]||[];
      if(row.filter(c=>String(c).trim()!=='').length>=1 && row.some(c=>KW.some(k=>String(c).includes(k)))){hr=r;break;}}
    if(hr<0)return;const H=(aoa[hr]||[]).map(x=>String(x||''));
    let col=H.findIndex(h=>['名称','客户','单位','户名'].some(k=>h.includes(k)));if(col<0)col=H.length-1;
    for(let r=hr+1;r<aoa.length;r++){const v=cleanName((aoa[r]||[])[col]);
      if(!v)continue;
      if(v.includes('在此填写')||v.includes('以下按行')||v==='客户名称'||v==='客户名称(标准)'||v==='客户名称（标准）')continue; // 只跳过模板占位/表头行
      std.add(v);}});
  return std;}
function handleMaster(file){const reader=new FileReader();
  reader.onload=e=>{let wb;try{wb=XLSX.read(e.target.result,{type:'array'});}catch(err){alert('无法读取：'+err);return;}
    const mv=validateFile(wb,'master');if(!mv.ok){alert(mv.msg);return;}
    const std=parseMaster(wb);if(std.size===0){alert('未能识别客户名清单，请使用「下载模版」的格式。');return;}
    store.master={fileName:file.name,std};renderMaster();if(result)generate();};
  reader.readAsArrayBuffer(file);}
function renderMaster(){const el=document.getElementById('masterStatus');
  if(!store.master){el.innerHTML='';return;}const m=store.master;
  el.innerHTML=`<div class="fitem" style="margin-top:12px;"><div class="fhead">
    <span class="badge" style="background:#ede9fe;color:#6d28d9;">客户名汇总</span>
    <span class="fname">${escapeHtml(m.fileName)}</span>
    <span class="badge rows">${m.std.size} 个标准客户名</span>
    <button class="rm" onclick="removeMaster()">移除</button></div></div>`;}
window.removeMaster=()=>{store.master=null;renderMaster();if(result)generate();};
window.downloadNewNames=()=>{if(!result||!result.newNames.length)return;
  const aoa=[['序号','新客户名称（请补充到客户名汇总表）'],...result.newNames.map((n,i)=>[i+1,n])];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,buildSheet(aoa,[10,42],0),'新客户名');saveFrozen(wb,'新客户名清单.xlsx');};

/* ============ 生成汇总 ============ */
function generate(){
  const incomeRows=store.income.flatMap(extractRows);
  const expenseRows=store.expense.flatMap(extractRows);
  const acceptRows=store.accept.flatMap(extractRows);
  const map=new Map();
  for(const row of [...incomeRows,...acceptRows,...expenseRows]){
    if(!map.has(row.name))map.set(row.name,{name:row.name,inCount:0,inSum:0,outCount:0,outSum:0,acCount:0,acSum:0,rows:[]});
    const c=map.get(row.name);
    if(row.category==='income'){c.inCount++;c.inSum+=row.amount;}
    else if(row.category==='accept'){c.acCount++;c.acSum+=row.amount;}
    else{c.outCount++;c.outSum+=row.amount;}
    c.rows.push(row);}
  const customers=[...map.values()].map(c=>({...c,net:c.inSum-c.outSum}));
  customers.sort((a,b)=>(b.inSum+b.outSum+b.acSum)-(a.inSum+a.outSum+a.acSum));
  const stdSet=store.master?store.master.std:DEFAULT_STD;
  const newNames=customers.filter(c=>!stdSet.has(c.name)).map(c=>c.name);
  result={customers,newNames,
    totalIn:incomeRows.reduce((s,r)=>s+r.amount,0),totalOut:expenseRows.reduce((s,r)=>s+r.amount,0),
    totalAc:acceptRows.reduce((s,r)=>s+r.amount,0),
    inCount:incomeRows.length,outCount:expenseRows.length,acCount:acceptRows.length};
  activeTab='__summary__';renderResult();
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});}
function dataPeriod(){if(!result)return '';
  const ds=sortByDate(result.customers.flatMap(c=>c.rows)).map(r=>r.date).filter(Boolean);
  const f=ds[0]||'',l=ds[ds.length-1]||'';return f?(f===l?f:`${f} — ${l}`):'';}

  document.getElementById('stats').innerHTML=`

    <div class="stat"><div class="k">客户数</div><div class="v">${r.customers.length}</div></div>`;

function summaryTable(){

  const km={name:c=>c.name,inCount:c=>c.inCount,inSum:c=>c.inSum,acCount:c=>c.acCount,acSum:c=>c.acSum,outCount:c=>c.outCount,outSum:c=>c.outSum,net:c=>c.net,both:c=>c.inSum+c.outSum+c.acSum};
  rows=[...rows].sort((a,b)=>{const va=km[sortKey](a),vb=km[sortKey](b);

function summaryDocHTML(rows){

function sortByDate(rows){

  return rows.slice().map((r,i)=>({r,i})).sort((x,y)=>{const k=key(x.r).localeCompare(key(y.r));return k||x.i-y.i;}).map(o=>o.r);}

/* ============ Excel 导出 ============ */
const HEADER_STYLE={fill:{patternType:'solid',fgColor:{rgb:'D9D9D9'}},font:{color:{rgb:'333333'},bold:true,sz:12},
  alignment:{horizontal:'center',vertical:'center'},border:{bottom:{style:'thin',color:{rgb:'A6A6A6'}}}};
function buildSheet(aoa,colW,headerRowIdx,moneyCols){
  const ws=XLSX.utils.aoa_to_sheet(aoa);if(colW)ws['!cols']=colW.map(w=>({wch:w}));
  const H=headerRowIdx,ncol=(aoa[H]||[]).length;
  for(let c=0;c<ncol;c++){const cell=ws[XLSX.utils.encode_cell({r:H,c})];if(cell)cell.s=HEADER_STYLE;}
  ws['!autofilter']={ref:XLSX.utils.encode_range({s:{r:H,c:0},e:{r:H,c:ncol-1}})};
  if(moneyCols){const range=XLSX.utils.decode_range(ws['!ref']);
    for(let R=H+1;R<=range.e.r;R++)for(const c of moneyCols){const cell=ws[XLSX.utils.encode_cell({r:R,c})];if(cell&&cell.t==='n')cell.z='"¥"#,##0.00';}}
  {const range=XLSX.utils.decode_range(ws['!ref']);   // 序号/年/月/日 列数字居中

async function saveFrozen(wb,filename,freezeRows){

      :{font:{sz:11,color:{rgb:'6B7280'}},alignment:{horizontal:'center',vertical:'center'}};});
  const hr=Math.max.apply(null,titleRows)+2;   // 列头行（标题+副标题+空行之后）灰底
  for(let c=0;c<colW.length;c++){const cell=ws[XLSX.utils.encode_cell({r:hr,c})];if(cell)cell.s=HEADER_STYLE;}
  const range=XLSX.utils.decode_range(ws['!ref']);

/* ===== 背景（微澜等高线·石墨灰）& 表头（极光·灰蓝），柔和「拨云」鼠标互动 ===== */
(function(){
  const NZ='float hn(vec2 p){p=fract(p*vec2(123.34,345.45));p+=dot(p,p+34.345);return fract(p.x*p.y);}'+
    'float nz(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.0-2.0*f);'+
    'float a=hn(i),b=hn(i+vec2(1.0,0.0)),c=hn(i+vec2(0.0,1.0)),d=hn(i+vec2(1.0,1.0));'+
    'return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}'+
    'float fbm(vec2 p){float v=0.0,a=0.5;mat2 m=mat2(1.6,1.2,-1.2,1.6);for(int i=0;i<5;i++){v+=a*nz(p);p=m*p;a*=0.5;}return v;}';
  const VS='attribute vec2 p;void main(){gl_Position=vec4(p,0.0,1.0);}';
  const AFS='precision mediump float;uniform vec2 uRes;uniform float uT;uniform vec3 uA,uB,uAcc1,uAcc2;uniform vec2 uMouse;uniform float uMh;uniform float uScale,uMix1,uMix2,uSpeed;'+NZ+
    'void main(){vec2 uv=gl_FragCoord.xy/uRes;float ar=uRes.x/uRes.y;vec3 col=mix(uA,uB,uv.x);'+
    'float t=uT*uSpeed;vec2 P=uv*vec2(ar,1.0)*uScale;'+
    'vec2 mp=vec2(uMouse.x*ar,uMouse.y)*uScale;vec2 dir=P-mp;float md=length(dir);'+
    'float env=exp(-md*md*2.0)*uMh;float wave=sin(md*12.0-uT*4.0);'+       /* 从光标荡开的同心涟漪 */
    'P+=normalize(dir+vec2(0.0001))*env*wave*0.12;'+
    'vec2 q=vec2(fbm(P*1.4+vec2(0.0,t)),fbm(P*1.4+vec2(3.0,-t)));float f=fbm(P*2.0+q*1.5+t);'+
    'col=mix(col,uAcc1,smoothstep(0.15,1.0,f)*uMix1);col=mix(col,uAcc2,smoothstep(0.55,1.15,f)*uMix2);'+
    'gl_FragColor=vec4(col,1.0);}';
  function start(cv,setup){
    if(!cv)return null;
    let gl;try{gl=cv.getContext('webgl',{antialias:false})||cv.getContext('experimental-webgl');}catch(e){}
    if(!gl){cv.style.display='none';return null;}
    function sh(t,s){const o=gl.createShader(t);gl.shaderSource(o,s);gl.compileShader(o);
      if(!gl.getShaderParameter(o,gl.COMPILE_STATUS))console.warn('fx shader:',gl.getShaderInfoLog(o));return o;}
    const pr=gl.createProgram();gl.attachShader(pr,sh(gl.VERTEX_SHADER,VS));gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,AFS));
    gl.linkProgram(pr);gl.useProgram(pr);
    const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
    const aP=gl.getAttribLocation(pr,'p');gl.enableVertexAttribArray(aP);gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);
    const U=n=>gl.getUniformLocation(pr,n);const uRes=U('uRes'),uT=U('uT'),uMouse=U('uMouse'),uMh=U('uMh');
    setup(gl,U);
    let W,H;function resize(){const dpr=Math.min(devicePixelRatio||1,1.35);
      W=cv.width=Math.max(1,Math.floor(cv.clientWidth*dpr));H=cv.height=Math.max(1,Math.floor(cv.clientHeight*dpr));gl.viewport(0,0,W,H);}

    return {draw(t,mx,my,mh){resize();gl.useProgram(pr);gl.bindBuffer(gl.ARRAY_BUFFER,buf);
      gl.enableVertexAttribArray(aP);gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);
      gl.uniform2f(uRes,W,H);gl.uniform1f(uT,t);gl.uniform2f(uMouse,mx,my);gl.uniform1f(uMh,mh);

  }
  const bg=start(document.getElementById('bg'),(gl,U)=>{
    gl.uniform3f(U('uA'),0.96,0.97,0.99);gl.uniform3f(U('uB'),0.91,0.93,0.97);
    gl.uniform3f(U('uAcc1'),0.42,0.52,0.66);gl.uniform3f(U('uAcc2'),0.62,0.72,0.86);
    gl.uniform1f(U('uScale'),1.6);gl.uniform1f(U('uMix1'),0.5);gl.uniform1f(U('uMix2'),0.34);gl.uniform1f(U('uSpeed'),0.05);});
  const hcv=document.getElementById('hdr');
  const hdr=start(hcv,(gl,U)=>{
    gl.uniform3f(U('uA'),0.94,0.96,0.99);gl.uniform3f(U('uB'),0.88,0.91,0.97);
    gl.uniform3f(U('uAcc1'),0.30,0.42,0.62);gl.uniform3f(U('uAcc2'),0.55,0.66,0.85);
    gl.uniform1f(U('uScale'),1.5);gl.uniform1f(U('uMix1'),0.72);gl.uniform1f(U('uMix2'),0.5);gl.uniform1f(U('uSpeed'),0.2);});
  if(!bg&&!hdr)return;
  let MX=innerWidth/2,MY=innerHeight/2,SX=MX,SY=MY,ht=0,hv=0;
  addEventListener('mousemove',e=>{MX=e.clientX;MY=e.clientY;ht=1;});
  addEventListener('mouseout',e=>{if(!e.relatedTarget)ht=0;});
  const t0=performance.now();
  function frame(now){
    const t=(now-t0)/1000;
    SX+=(MX-SX)*0.07;SY+=(MY-SY)*0.07;hv+=(ht-hv)*0.05;

  }

})();

    for(let i=0;i<A;i++){const a=i/A*2*Math.PI-Math.PI/2,pa=a+Math.PI/2,px=Math.cos(pa),py=Math.sin(pa);
      const hx=cx+Math.cos(a)*hubR,hy=cy+Math.sin(a)*hubR,rx=cx+Math.cos(a)*rimInner,ry=cy+Math.sin(a)*rimInner;
      arms+='<path d="M'+(hx+px*wH/2).toFixed(2)+' '+(hy+py*wH/2).toFixed(2)+'L'+(rx+px*wR/2).toFixed(2)+' '+(ry+py*wR/2).toFixed(2)+'L'+(rx-px*wR/2).toFixed(2)+' '+(ry-py*wR/2).toFixed(2)+'L'+(hx-px*wH/2).toFixed(2)+' '+(hy-py*wH/2).toFixed(2)+'Z" fill="url(#'+id+')" stroke="'+o.c3+'" stroke-width="0.3"/>';}
    const hub='<path d="M'+(cx+hubR)+' '+cy+' A'+hubR+' '+hubR+' 0 1 0 '+(cx-hubR)+' '+cy+' A'+hubR+' '+hubR+' 0 1 0 '+(cx+hubR)+' '+cy+'Z'+rev(boreR)+'" fill="url(#'+id+')" fill-rule="evenodd" stroke="'+o.c3+'" stroke-width="0.4"/>';
    return '<svg style="'+pos(o)+'width:'+o.sz+'px;height:'+o.sz+'px;opacity:'+(o.op||0.8)+';'+anim(o)+'" viewBox="0 0 100 100">'+grad+rim+arms+hub+'</svg>';}
  function ring(o){return '<svg style="'+pos(o)+'width:'+o.sz+'px;height:'+o.sz+'px;opacity:'+(o.op||0.4)+';'+anim(o)+'" viewBox="0 0 100 100">'+
    '<circle cx="50" cy="50" r="'+(o.r||44)+'" fill="none" stroke="'+o.col+'" stroke-width="'+(o.sw||1.4)+'" stroke-dasharray="'+(o.dash||'3 4')+'"/></svg>';}
  const G=(o,pal)=>gear(Object.assign({},pal,o));
  if(L)L.innerHTML=ring({side:'L',sz:300,x:-70,bottom:-70,r:44,col:'#5c7096',sw:5,dash:'2 3',op:.4,dur:150})+
    G({side:'L',sz:118,x:92,bottom:92,N:20,dur:20,op:.82},S1)+
    G({side:'L',sz:80,x:150,bottom:118,N:14,dur:14,rev:1,arms:4,op:.78},S2)+
    G({side:'L',sz:80,x:58,bottom:150,N:14,dur:14,rev:1,arms:4,op:.78},S2)+
    G({side:'L',sz:80,x:104,bottom:36,N:14,dur:14,rev:1,arms:4,op:.78},S2);
  if(R)R.innerHTML=G({side:'R',sz:126,x:58,bottom:70,N:20,dur:20,op:.82},S1)+
    G({side:'R',sz:84,x:122,bottom:96,N:14,dur:14,rev:1,arms:4,op:.78},S2)+
    G({side:'R',sz:84,x:34,bottom:32,N:14,dur:14,rev:1,arms:4,op:.78},S2);
})();
</script>
