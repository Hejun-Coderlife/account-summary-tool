<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户账目汇总工具</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22g%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%221%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%236aa8ff%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%238b5cf6%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Cpath%20d%3D%22M13.5%204.8%20L14.1%201.1%20L17.9%201.1%20L18.5%204.8%20L22.2%206.3%20L25.2%204.1%20L27.9%206.8%20L25.7%209.8%20L27.2%2013.5%20L30.9%2014.1%20L30.9%2017.9%20L27.2%2018.5%20L25.7%2022.2%20L27.9%2025.2%20L25.2%2027.9%20L22.2%2025.7%20L18.5%2027.2%20L17.9%2030.9%20L14.1%2030.9%20L13.5%2027.2%20L9.8%2025.7%20L6.8%2027.9%20L4.1%2025.2%20L6.3%2022.2%20L4.8%2018.5%20L1.1%2017.9%20L1.1%2014.1%20L4.8%2013.5%20L6.3%209.8%20L4.1%206.8%20L6.8%204.1%20L9.8%206.3%20Z%22%20fill%3D%22url%28%23g%29%22%2F%3E%3Ccircle%20cx%3D%2216%22%20cy%3D%2216%22%20r%3D%226.5%22%20fill%3D%22%230d1030%22%2F%3E%3Ccircle%20cx%3D%2216%22%20cy%3D%2216%22%20r%3D%222.6%22%20fill%3D%22url%28%23g%29%22%2F%3E%3C%2Fsvg%3E">
<script src="xlsx.full.min.js"></script>
<script src="html2canvas.min.js"></script>
<script src="jszip.min.js"></script>
<style>
  :root{
    --bg:#f5f7fc; --panel:#ffffff; --ink:#1f2540; --muted:#6b7395;
    --line:#e7eaf5; --brand:#4f46e5; --brand-d:#4338ca; --accent:#06b6d4;
    --in:#0e9c6d; --in-bg:#e9faf3; --out:#e5484d; --out-bg:#fdecec;
    --shadow:0 1px 3px rgba(30,35,70,.06),0 14px 36px rgba(79,70,229,.09);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;
    background:radial-gradient(120% 90% at 50% 32%, #1b1546 0%, #100e2e 55%, #080813 100%);background-attachment:fixed;}
  #netsphere{position:fixed;inset:0;width:100%;height:100%;z-index:-1;display:block;touch-action:none;}
  .net-label{position:fixed;left:0;right:0;top:78%;z-index:-1;text-align:center;pointer-events:none;
    color:#b9c2ee;font-size:12px;letter-spacing:3px;opacity:.55;font-weight:600;}
  .net-label span{font-size:10px;letter-spacing:2px;opacity:.75;}
  header.top{position:relative;overflow:hidden;color:#eaf0ff;padding:17px 28px 18px;text-align:center;
    background:linear-gradient(120deg,#0f1533 0%,#1c2350 46%,#2a1e57 100%);box-shadow:0 10px 30px rgba(15,18,45,.30);}
  header.top::before{content:"";position:absolute;inset:-50% -12%;pointer-events:none;
    background:
      radial-gradient(28% 65% at 22% 45%, rgba(56,189,248,.30), transparent 60%),
      radial-gradient(26% 60% at 78% 58%, rgba(139,92,246,.34), transparent 60%),
      radial-gradient(22% 55% at 52% 30%, rgba(99,102,241,.26), transparent 60%);
    animation:aur 15s ease-in-out infinite alternate;}
  @keyframes aur{from{transform:translate(-4%,0) scale(1);}to{transform:translate(6%,2%) scale(1.12);}}
  header.top::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;
    background:linear-gradient(90deg,#38bdf8,#6366f1,#a855f7,#38bdf8);background-size:200% 100%;animation:lineShift 7s linear infinite;}
  @keyframes lineShift{to{background-position:200% 0;}}
  .brand{position:relative;z-index:2;display:inline-flex;align-items:center;justify-content:center;gap:13px;}
  .logo{width:34px;height:34px;flex:none;display:block;filter:drop-shadow(0 3px 8px rgba(99,102,241,.55));animation:logoPulse 3.4s ease-in-out infinite;}
  @keyframes logoPulse{0%,100%{filter:drop-shadow(0 3px 7px rgba(99,102,241,.45));}50%{filter:drop-shadow(0 3px 12px rgba(56,189,248,.75));}}
  .brand h1{margin:0;font-size:24px;font-weight:700;letter-spacing:1.5px;line-height:1.1;color:#f3f6ff;text-shadow:0 1px 14px rgba(120,140,255,.4);}
  .wrap{max-width:1180px;margin:0 auto;padding:24px 20px 90px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:20px 22px;margin-bottom:20px;}
  .card h2{margin:0 0 4px;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
  .card .hint{color:var(--muted);font-size:12.5px;margin:0 0 16px;}
  .step{display:inline-flex;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#4f46e5,#06b6d4);color:#fff;
    font-size:12px;align-items:center;justify-content:center;font-weight:600;box-shadow:0 3px 8px rgba(79,70,229,.32);}
  .drop-row{display:grid;grid-template-columns:1fr 1fr 0.72fr;gap:16px;align-items:stretch;}
  @media(max-width:720px){.drop-row{grid-template-columns:1fr;}}
  .drop{border:1.5px solid var(--line);border-radius:12px;padding:22px;text-align:center;cursor:pointer;transition:.15s;background:#fafbff;}
  .drop:hover{border-color:var(--brand);background:#f2f4ff;}
  .drop.master{padding:18px 14px;background:#faf9ff;}
  .drop .tag{display:inline-block;font-size:12px;font-weight:600;padding:2px 10px;border-radius:999px;margin-bottom:8px;}
  .drop.income .tag{background:var(--in-bg);color:var(--in);}
  .drop.expense .tag{background:var(--out-bg);color:var(--out);}
  .drop.master .tag{background:#ede9fe;color:#6d28d9;}
  .drop-ico{width:32px;height:32px;display:block;margin:2px auto 10px;}
  .drop.income .drop-ico{color:var(--in);}
  .drop.expense .drop-ico{color:var(--out);}
  .drop.master .drop-ico{color:#8b5cf6;width:28px;height:28px;}
  .act{font-size:13.5px;font-weight:600;color:var(--ink);}
  .drop.master .act{font-size:12px;}
  .tpl-link{display:inline-block;margin-top:10px;font-size:12.5px;color:var(--brand);border:1px solid var(--line);
    background:#fff;border-radius:7px;padding:4px 12px;cursor:pointer;}
  .tpl-link:hover{border-color:var(--brand);background:#f0f6ff;}
  .filelist{margin-top:14px;display:flex;flex-direction:column;gap:10px;}
  .fitem{border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:#fbfcff;}
  .fitem .fhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .fitem .fname{font-weight:600;font-size:13.5px;flex:1;min-width:180px;word-break:break-all;}
  .badge{font-size:11px;padding:1px 8px;border-radius:999px;font-weight:600;}
  .badge.in{background:var(--in-bg);color:var(--in);}
  .badge.out{background:var(--out-bg);color:var(--out);}
  .badge.rows{background:#eef2ff;color:#4338ca;}
  .rm{background:none;border:none;color:var(--out);cursor:pointer;font-size:12px;font-weight:600;padding:4px;}
  .btn{border:none;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit;}
  .btn.primary{background:linear-gradient(135deg,#4f46e5 0%,#06b6d4 100%);color:#fff;box-shadow:0 6px 18px rgba(79,70,229,.32);}
  .btn.primary:hover{filter:brightness(1.06);box-shadow:0 9px 24px rgba(79,70,229,.4);}
  .btn.primary:disabled{background:linear-gradient(135deg,#8f96ad,#9aa2b8);color:#f2f4fa;box-shadow:none;filter:none;cursor:not-allowed;}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink);}
  .btn.ghost:hover{border-color:var(--brand);color:var(--brand);}
  .btn.sm{padding:5px 12px;font-size:12.5px;border-radius:7px;}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .toolbar .spacer{flex:1;}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
  .stat{border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:#fbfcff;}
  .stat .k{font-size:12px;color:var(--muted);}
  .stat .v{font-size:20px;font-weight:700;margin-top:2px;}
  .stat.in .v{color:var(--in);} .stat.out .v{color:var(--out);}
  .tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);overflow-x:auto;}
  .tab{padding:9px 14px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;font-weight:600;}
  .tab.active{color:var(--brand);border-bottom-color:var(--brand);}
  .search{padding:7px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;width:220px;max-width:100%;font-family:inherit;}
  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px;margin-top:14px;}
  .tablewrap table thead tr:first-child th:first-child{border-top-left-radius:9px;}
  .tablewrap table thead tr:first-child th:last-child{border-top-right-radius:9px;}
  .tablewrap table tbody tr:last-child td:first-child{border-bottom-left-radius:9px;}
  .tablewrap table tbody tr:last-child td:last-child{border-bottom-right-radius:9px;}
  table{border-collapse:collapse;width:100%;font-size:13px;}
  th,td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap;}
  th{background:#f8fafc;font-weight:600;color:#475569;position:sticky;top:0;cursor:pointer;user-select:none;}
  tbody tr:hover{background:#f8fbff;}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;}
  td.ctr,th.ctr{text-align:center;font-variant-numeric:tabular-nums;}
  .pos{color:var(--in);font-weight:600;} .neg{color:var(--out);font-weight:600;}
  tr.total-row td{font-weight:700;background:#f1f5f9;border-top:1px solid var(--line);}
  tr.total-row td.pos{color:var(--in);} tr.total-row td.neg{color:var(--out);}
  .cust-link{color:var(--brand);cursor:pointer;text-decoration:none;font-weight:600;}
  .cust-link:hover{text-decoration:underline;}
  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;}
  .pill{font-size:11px;padding:1px 7px;border-radius:999px;font-weight:600;}
  .pill.in{background:var(--in-bg);color:var(--in);} .pill.out{background:var(--out-bg);color:var(--out);}
  #panelBody{padding-top:2px;}
  .cust-controls{max-width:860px;margin:6px auto 0;display:flex;justify-content:flex-end;gap:14px;font-size:13px;color:var(--muted);}
  .cust-controls label{display:inline-flex;align-items:center;gap:5px;cursor:pointer;user-select:none;}
  .statement{max-width:860px;margin:12px auto 0;padding:28px 36px 22px;background:#fff;border:1px solid var(--line);border-radius:14px;}
  .st-title{text-align:center;font-size:19px;font-weight:700;letter-spacing:.5px;margin:6px 0 2px;}
  .st-sub{text-align:center;font-size:13.5px;color:var(--muted);margin:0 0 14px;}
  .st-foot{text-align:right;font-size:12.5px;color:var(--muted);margin:10px 4px 0;}
  .capturing{box-shadow:none!important;}
  .capturing .tablewrap{overflow:visible!important;}
  .warn{border:1px solid #fca5a5;background:#fef2f2;border-left:4px solid var(--out);border-radius:10px;padding:14px 18px;margin-bottom:16px;}
  .warn.ok{border-color:#86efac;background:#f0fdf4;border-left-color:var(--in);}
  .warn h4{margin:0 0 6px;color:#b91c1c;font-size:14px;}
  .warn.ok h4{color:#15803d;}
  .warn .names{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;max-height:180px;overflow:auto;}
  .warn .chip{background:#fff;border:1px solid #fca5a5;color:#b91c1c;border-radius:6px;padding:2px 9px;font-size:12.5px;}
  .foot{text-align:center;color:#aeb6c8;font-size:12px;margin-top:20px;}
  .hidden{display:none;}
</style>
</head>
<body>
<canvas id="netsphere" aria-hidden="true"></canvas>
<div class="net-label" aria-hidden="true">客户往来网络 · CLIENT NETWORK<br><span>拖拽旋转 · 滚轮缩放</span></div>
<header class="top">
  <div class="brand">
    <span class="logo" aria-hidden="true"><svg viewBox="0 0 36 36" fill="none">
      <defs><linearGradient id="lg" x1="0" y1="1" x2="1" y2="0">
        <stop offset="0" stop-color="#38bdf8"/><stop offset="0.55" stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient></defs>
      <rect x="4" y="21" width="6.5" height="11" rx="2.2" fill="url(#lg)"/>
      <rect x="14.75" y="12" width="6.5" height="20" rx="2.2" fill="url(#lg)"/>
      <rect x="25.5" y="5" width="6.5" height="27" rx="2.2" fill="url(#lg)"/>
      <path d="M7.25 16 L18 7.5 L28.75 3" stroke="#c7d2fe" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
    </svg></span>
    <h1>客户账目汇总工具</h1>
  </div>
</header>

<div class="wrap">
  <!-- STEP 1: upload + generate -->
  <div class="card">
    <h2><span class="step">1</span> 上传表格</h2>
    <p class="hint">支持 .xlsx / .xls / .csv</p>
    <div class="drop-row">
      <div class="drop income" id="dropIncome">
        <span class="tag">进账 · 收入</span>
        <svg class="drop-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 14.5V4"/><path d="M8 8l4-4 4 4"/><path d="M4 15v3.5a1.5 1.5 0 0 0 1.5 1.5h13a1.5 1.5 0 0 0 1.5-1.5V15"/></svg>
        <div class="act">点击或拖入文件</div>
        <div class="tpl-link" onclick="event.stopPropagation();downloadTemplate('income')">下载空白模版</div>
        <input type="file" id="fileIncome" multiple accept=".xlsx,.xls,.csv" class="hidden">
      </div>
      <div class="drop expense" id="dropExpense">
        <span class="tag">开票金额</span>
        <svg class="drop-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 14.5V4"/><path d="M8 8l4-4 4 4"/><path d="M4 15v3.5a1.5 1.5 0 0 0 1.5 1.5h13a1.5 1.5 0 0 0 1.5-1.5V15"/></svg>
        <div class="act">点击或拖入文件</div>
        <div class="tpl-link" onclick="event.stopPropagation();downloadTemplate('expense')">下载空白模版</div>
        <input type="file" id="fileExpense" multiple accept=".xlsx,.xls,.csv" class="hidden">
      </div>
      <div class="drop master" id="dropMaster">
        <span class="tag">客户名汇总</span>
        <svg class="drop-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4V3.2a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1V4"/><path d="M8.5 10h7M8.5 13.5h7M8.5 17h4"/></svg>
        <div class="act">点击或拖入文件</div>
        <div class="tpl-link" onclick="event.stopPropagation();downloadTemplate('master')">下载空白模版</div>
        <input type="file" id="fileMaster" accept=".xlsx,.xls,.csv" class="hidden">
      </div>
    </div>
    <div id="masterStatus"></div>
    <div class="filelist" id="fileList"></div>
    <div style="text-align:center;margin-top:20px;padding-top:18px;border-top:1px solid var(--line);">
      <button class="btn primary" id="genBtn" disabled>生成汇总表</button>
      <div class="hint" id="genHint" style="margin:10px 0 0;"></div>
    </div>
  </div>

  <!-- STEP 2: preview + download -->
  <div class="card hidden" id="resultCard">
    <h2><span class="step">2</span> 预览与下载</h2>
    <div id="warnBox"></div>
    <div class="stats" id="stats"></div>
    <div class="toolbar" style="margin-bottom:14px;">
      <button class="btn primary" id="dlAll">下载汇总工作簿（含各客户分表）</button>
      <button class="btn ghost" id="dlSummary">仅下载汇总表</button>
      <button class="btn ghost" id="dlCurrent">下载当前客户分表</button>
      <button class="btn ghost" id="dlImage">下载当前表格图片</button>
      <button class="btn ghost" id="dlAllImages">批量下载全部图片(ZIP)</button>
      <span class="spacer"></span>
      <input type="text" class="search" id="search" placeholder="搜索客户名…">
    </div>
    <div class="tabs" id="tabs"></div>
    <div id="panelBody"></div>
  </div>

  <div class="foot">数据全部在本机浏览器中处理，不会上传到任何服务器。</div>
</div>

<script>

const AMT_KEYS=['金额','交易金额','发生额','收入','支出','价税','合计','元','款'];
const YEAR_KEYS=['年份','年度','年'];
const MONTH_KEYS=['月份','月'];

/* ============ 工具 ============ */
function cleanNum(v){if(v==null||v==='')return 0;if(typeof v==='number')return v;
  const s=String(v).replace(/[,¥$￥\s元]/g,'').replace(/[（(].*?[)）]/g,'');const n=parseFloat(s);return isNaN(n)?0:n;}
function cleanName(v){if(v==null)return '';return String(v).replace(/\s+/g,'').trim();}
function fmt(n){return (Math.round((n+Number.EPSILON)*100)/100).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function round2(n){return Math.round((n+Number.EPSILON)*100)/100;}
function todayCN(){const d=new Date();return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function escapeAttr(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function findCol(headers,keys){for(let i=0;i<headers.length;i++){const h=String(headers[i]==null?'':headers[i]);for(const k of keys){if(h.includes(k))return i;}}return -1;}
function analyzeSheet(aoa){
  let hr=-1;
  for(let r=0;r<Math.min(aoa.length,10);r++){const row=aoa[r]||[];
    const ne=row.filter(c=>c!=null&&String(c).trim()!=='').length;
    if(ne>=2 && findCol(row,NAME_KEYS)>=0 && findCol(row,AMT_KEYS)>=0){hr=r;break;}}
  if(hr<0)for(let r=0;r<Math.min(aoa.length,10);r++){const row=aoa[r]||[];if(row.filter(c=>c!=null&&String(c).trim()!=='').length>=2){hr=r;break;}}
  if(hr<0)return null;
  const H=(aoa[hr]||[]).map(h=>h==null?'':String(h));
  return{headerRow:hr,headers:H,nameCol:findCol(H,NAME_KEYS),amountCol:findCol(H,AMT_KEYS),
    yearCol:findCol(H,YEAR_KEYS),monthCol:findCol(H,MONTH_KEYS),dateCol:findCol(H,DAY_KEYS),
    remarkCol:findCol(H,REMARK_KEYS),dataRows:aoa.length-hr-1};
}
function pickBestSheet(wb){let best=null,bs=-1;
  for(const name of wb.SheetNames){const aoa=XLSX.utils.sheet_to_json(wb.Sheets[name],{header:1,defval:''});
    const a=analyzeSheet(aoa);if(!a)continue;let sc=0;if(a.nameCol>=0)sc+=100;if(a.amountCol>=0)sc+=100;sc+=Math.min(a.dataRows,500)/10;
    if(sc>bs){bs=sc;best={name,analysis:a};}}
  return best;}
function buildDate(row,a){const pad=v=>String(v).padStart(2,'0');
  if(a.dateCol>=0 && row[a.dateCol] instanceof Date){const d=row[a.dateCol];return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
  const num=x=>{const n=parseInt(String(x).replace(/[^0-9]/g,''),10);return isNaN(n)?null:n;};
  const y=a.yearCol>=0?num(row[a.yearCol]):null,m=a.monthCol>=0?num(row[a.monthCol]):null,d=a.dateCol>=0?num(row[a.dateCol]):null;
  if(y&&m&&d)return `${y}年${m}月${d}日`;
  if(m&&d)return `${m}月${d}日`;
  if(d)return `${d}`;
  return '';}
function extractRows(entry){
  const aoa=XLSX.utils.sheet_to_json(entry.wb.Sheets[entry.selectedSheet],{header:1,defval:'',cellDates:true});
  const a=entry.analysis,out=[];
  for(let r=a.headerRow+1;r<aoa.length;r++){const row=aoa[r]||[];
    const name=cleanName(row[a.nameCol]);const amount=cleanNum(a.amountCol>=0?row[a.amountCol]:'');
    if(!name)continue;
    const date=buildDate(row,a);
    const remark=a.remarkCol>=0?String(row[a.remarkCol]==null?'':row[a.remarkCol]):'';
    out.push({name,amount,date,remark,source:entry.name,category:entry.category});}
  return out;}

/* ============ 上传 ============ */
function handleFiles(fileList,category){
  Array.from(fileList).forEach(file=>{const reader=new FileReader();
    reader.onload=e=>{let wb;try{wb=XLSX.read(e.target.result,{type:'array',cellDates:true});}catch(err){alert('无法读取文件：'+file.name+'\n'+err);return;}
      const picked=pickBestSheet(wb);
      const entry={id:'f'+Math.random().toString(36).slice(2,9),name:file.name,category,wb,
        selectedSheet:picked?picked.name:wb.SheetNames[0],analysis:picked?picked.analysis:null};
      if(!entry.analysis){const aoa=XLSX.utils.sheet_to_json(wb.Sheets[entry.selectedSheet],{header:1,defval:''});
        entry.analysis=analyzeSheet(aoa)||{headerRow:0,headers:aoa[0]||[],nameCol:-1,amountCol:-1,yearCol:-1,monthCol:-1,dateCol:-1,remarkCol:-1,dataRows:0};}
      store[category].push(entry);renderFileList();updateGenState();};
    reader.readAsArrayBuffer(file);});}
function renderFileList(){
  const box=document.getElementById('fileList');const all=[...store.income,...store.expense];
  if(all.length===0){box.innerHTML='';return;}
  box.innerHTML=all.map(en=>{const a=en.analysis;
    const badge=en.category==='income'?'<span class="badge in">进账</span>':'<span class="badge out">开票</span>';
    const ok=a.nameCol>=0&&a.amountCol>=0;
    const st=ok?'<span class="badge" style="background:#dcfce7;color:#15803d;">✓ 已识别</span>'
      :'<span class="badge" style="background:#fef3c7;color:#b45309;">⚠ 未识别客户名/金额列，请用模版格式</span>';
    return `<div class="fitem"><div class="fhead">${badge}
      <span class="fname">${escapeHtml(en.name)}</span>
      <span class="badge rows">${a.dataRows||0} 行数据</span>${st}
      <button class="rm" onclick="removeFile('${en.id}')">移除</button></div></div>`;}).join('');}
window.removeFile=id=>{store.income=store.income.filter(e=>e.id!==id);store.expense=store.expense.filter(e=>e.id!==id);renderFileList();updateGenState();};
function updateGenState(){
  const all=[...store.income,...store.expense];
  const ok=all.length>0 && all.every(e=>e.analysis.nameCol>=0&&e.analysis.amountCol>=0);
  document.getElementById('genBtn').disabled=!ok;
  const h=document.getElementById('genHint');
  if(all.length===0)h.textContent='请先上传至少一个表格。';
  else if(!ok)h.textContent='部分文件未能识别「客户名」或「金额」列，请用「下载空白模版」的格式。';
  else h.textContent='';}

/* ============ 客户名汇总（标准名单） ============ */
function parseMaster(wb){
  const KW=['名称','标准','客户','单位','户名','名单'];const std=new Set();
  wb.SheetNames.forEach(sn=>{const aoa=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
    let hr=-1;for(let r=0;r<Math.min(aoa.length,8);r++){const row=aoa[r]||[];
      if(row.filter(c=>String(c).trim()!=='').length>=1 && row.some(c=>KW.some(k=>String(c).includes(k)))){hr=r;break;}}
    if(hr<0)return;const H=(aoa[hr]||[]).map(x=>String(x||''));
    let col=H.findIndex(h=>['名称','客户','单位','户名'].some(k=>h.includes(k)));if(col<0)col=H.length-1;
    for(let r=hr+1;r<aoa.length;r++){const v=cleanName((aoa[r]||[])[col]);if(v && !v.startsWith('（') && !v.startsWith('('))std.add(v);}});
  return std;}
function handleMaster(file){const reader=new FileReader();
  reader.onload=e=>{let wb;try{wb=XLSX.read(e.target.result,{type:'array'});}catch(err){alert('无法读取：'+err);return;}
    const std=parseMaster(wb);if(std.size===0){alert('未能识别客户名清单，请使用「下载空白模版」的格式。');return;}
    store.master={fileName:file.name,std};renderMaster();if(result)generate();};
  reader.readAsArrayBuffer(file);}
function renderMaster(){const el=document.getElementById('masterStatus');
  if(!store.master){el.innerHTML='';return;}const m=store.master;
  el.innerHTML=`<div class="fitem" style="margin-top:12px;"><div class="fhead">
    <span class="badge" style="background:#ede9fe;color:#6d28d9;">客户名汇总</span>
    <span class="fname">${escapeHtml(m.fileName)}</span>
    <span class="badge rows">${m.std.size} 个标准客户名</span>
    <button class="rm" onclick="removeMaster()">移除</button></div></div>`;}
window.removeMaster=()=>{store.master=null;renderMaster();if(result)generate();};
window.downloadNewNames=()=>{if(!result||!result.newNames.length)return;
  const aoa=[['序号','新客户名称（请补充到客户名汇总表）'],...result.newNames.map((n,i)=>[i+1,n])];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,buildSheet(aoa,[10,42],0),'新客户名');saveFrozen(wb,'新客户名清单.xlsx');};

/* ============ 生成汇总 ============ */
function generate(){
  const incomeRows=store.income.flatMap(extractRows);
  const expenseRows=store.expense.flatMap(extractRows);
  const map=new Map();
  for(const row of [...incomeRows,...expenseRows]){
    if(!map.has(row.name))map.set(row.name,{name:row.name,inCount:0,inSum:0,outCount:0,outSum:0,rows:[]});
    const c=map.get(row.name);
    if(row.category==='income'){c.inCount++;c.inSum+=row.amount;}else{c.outCount++;c.outSum+=row.amount;}
    c.rows.push(row);}
  const customers=[...map.values()].map(c=>({...c,net:c.inSum-c.outSum}));
  customers.sort((a,b)=>(b.inSum+b.outSum)-(a.inSum+a.outSum));
  const newNames=store.master?customers.filter(c=>!store.master.std.has(c.name)).map(c=>c.name):[];
  result={customers,newNames,
    totalIn:incomeRows.reduce((s,r)=>s+r.amount,0),totalOut:expenseRows.reduce((s,r)=>s+r.amount,0),
    inCount:incomeRows.length,outCount:expenseRows.length};
  activeTab='__summary__';renderResult();
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});}
function dataPeriod(){if(!result)return '';
  const ds=sortByDate(result.customers.flatMap(c=>c.rows)).map(r=>r.date).filter(Boolean);
  const f=ds[0]||'',l=ds[ds.length-1]||'';return f?(f===l?f:`${f} — ${l}`):'';}

function renderResult(){
  const card=document.getElementById('resultCard');card.classList.remove('hidden');const r=result;

    wb.innerHTML=`<div class="warn"><h4>⚠️ 发现 ${r.newNames.length} 个不在「客户名汇总」中的新客户名</h4>
      <div>以下客户名未出现在客户名汇总表里（可能是新客户，或写法与标准名不一致），请核对并更新：</div>
      <div class="names">${r.newNames.map(n=>`<span class="chip">${escapeHtml(n)}</span>`).join('')}</div>
      <button class="btn ghost sm" onclick="downloadNewNames()">下载新客户名清单</button></div>`;}
  else if(store.master){wb.innerHTML=`<div class="warn ok"><h4>✓ 全部 ${r.customers.length} 个客户名都在「客户名汇总」标准名单中</h4></div>`;}
  else wb.innerHTML='';
  document.getElementById('stats').innerHTML=`
    <div class="stat in"><div class="k">进账合计（收入）</div><div class="v">¥${fmt(r.totalIn)}</div><div class="k">${r.inCount} 笔</div></div>
    <div class="stat out"><div class="k">开票合计</div><div class="v">¥${fmt(r.totalOut)}</div><div class="k">${r.outCount} 笔</div></div>
    <div class="stat"><div class="k">净额（进账−开票）</div><div class="v" style="color:${r.totalIn-r.totalOut>=0?'var(--in)':'var(--out)'}">¥${fmt(r.totalIn-r.totalOut)}</div></div>
    <div class="stat"><div class="k">客户数</div><div class="v">${r.customers.length}</div></div>`;
  renderTabs();renderPanel();}
function renderTabs(){
  const q=(document.getElementById('search')?.value||'').trim();
  const list=result.customers.filter(c=>!q||c.name.includes(q));
  let html=`<button class="tab ${activeTab==='__summary__'?'active':''}" onclick="switchTab('__summary__')">汇总表</button>`;
  html+=list.map(c=>`<button class="tab ${activeTab===c.name?'active':''}" onclick="switchTab('${escapeAttr(c.name)}')">${escapeHtml(c.name)}</button>`).join('');
  document.getElementById('tabs').innerHTML=html;}
window.switchTab=name=>{activeTab=name;renderTabs();renderPanel();};
function renderPanel(){const body=document.getElementById('panelBody');
  if(activeTab==='__summary__'){body.innerHTML=summaryTable();return;}
  const c=result.customers.find(x=>x.name===activeTab);
  if(!c){body.innerHTML='<div class="empty">未找到该客户</div>';return;}
  body.innerHTML=custDetail(c);}
function summaryTable(){
  const q=(document.getElementById('search')?.value||'').trim();
  let rows=result.customers.filter(c=>!q||c.name.includes(q));
  const km={name:c=>c.name,inSum:c=>c.inSum,outSum:c=>c.outSum,net:c=>c.net,both:c=>c.inSum+c.outSum};
  rows=[...rows].sort((a,b)=>{const va=km[sortKey](a),vb=km[sortKey](b);
    if(typeof va==='string')return sortDir*va.localeCompare(vb,'zh');return sortDir*(va-vb);});
  if(rows.length===0)return '<div class="empty">没有匹配的客户</div>';
  return summaryDocHTML(rows);}
function summaryDocHTML(rows){
  let tIn=0,tOut=0,tInC=0,tOutC=0;
  const trs=rows.map((c,i)=>{tIn+=c.inSum;tOut+=c.outSum;tInC+=c.inCount;tOutC+=c.outCount;
    return `<tr><td class="ctr" style="color:var(--muted)">${i+1}</td>
      <td><a class="cust-link" onclick="switchTab('${escapeAttr(c.name)}')">${escapeHtml(c.name)}</a></td>
      <td class="num">${c.inCount||''}</td>
      <td class="num pos">${c.inSum?'¥'+fmt(c.inSum):''}</td>
      <td class="num">${c.outCount||''}</td>

function buildSheet(aoa,colW,headerRowIdx,moneyCols){

  ws['!autofilter']={ref:XLSX.utils.encode_range({s:{r:H,c:0},e:{r:H,c:ncol-1}})};
  if(moneyCols){const range=XLSX.utils.decode_range(ws['!ref']);
    for(let R=H+1;R<=range.e.r;R++)for(const c of moneyCols){const cell=ws[XLSX.utils.encode_cell({r:R,c})];if(cell&&cell.t==='n')cell.z='"¥"#,##0.00';}}

async function saveFrozen(wb,filename,freezeRows){
  const arr=XLSX.write(wb,{type:'array',bookType:'xlsx'});const zip=await JSZip.loadAsync(arr);
  const files=Object.keys(zip.files).filter(f=>/^xl\/worksheets\/sheet\d+\.xml$/.test(f));
  const y=freezeRows||1;
  const pane=`<pane ySplit="${y}" topLeftCell="A${y+1}" activePane="bottomLeft" state="frozen"/><selection pane="bottomLeft"/>`;
  for(const f of files){let xml=await zip.file(f).async('string');
    if(/<sheetView[^>]*\/>/.test(xml))xml=xml.replace(/<sheetView([^>]*)\/>/,'<sheetView$1>'+pane+'</sheetView>');
    else if(/<sheetView[^>]*>/.test(xml))xml=xml.replace(/(<sheetView[^>]*>)/,'$1'+pane);
    else xml=xml.replace(/(<worksheet[^>]*>)/,'$1<sheetViews><sheetView workbookViewId="0">'+pane+'</sheetView></sheetViews>');
    zip.file(f,xml);}
  const blob=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),3000);}

/* ===== 数据地球（WebGL：经纬线框地球自转 + 客户光点 + 轨道卫星，可拖拽/缩放） ===== */
(function(){
  const cv=document.getElementById('netsphere');
  if(!cv)return;
  let gl;try{gl=cv.getContext('webgl',{alpha:true,antialias:true,premultipliedAlpha:false});}catch(e){}
  if(!gl){cv.style.display='none';return;}
  const wpos=[],widx=[];
  function ring(lat,seg){const y=Math.sin(lat),r=Math.cos(lat),base=wpos.length/3;
    for(let i=0;i<seg;i++){const a=i/seg*2*Math.PI;wpos.push(Math.cos(a)*r,y,Math.sin(a)*r);}
    for(let i=0;i<seg;i++){widx.push(base+i,base+(i+1)%seg);}}
  function meridian(phi,seg){const base=wpos.length/3;
    for(let i=0;i<=seg;i++){const t=-Math.PI/2+i/seg*Math.PI,y=Math.sin(t),r=Math.cos(t);wpos.push(Math.cos(phi)*r,y,Math.sin(phi)*r);}
    for(let i=0;i<seg;i++){widx.push(base+i,base+i+1);}}
  const LAT=7;for(let k=1;k<LAT;k++)ring(-Math.PI/2+k/LAT*Math.PI,96);
  const MER=12;for(let m=0;m<MER;m++)meridian(m/MER*2*Math.PI,64);
  const CP=110,GA=Math.PI*(3-Math.sqrt(5)),ppos=[];
  for(let i=0;i<CP;i++){const y=1-(i/(CP-1))*2,r=Math.sqrt(Math.max(0,1-y*y)),th=i*GA;ppos.push(Math.cos(th)*r*1.005,y*1.005,Math.sin(th)*r*1.005);}
  const spos=[];const ORB=[{r:1.5,inc:0.35,n:6},{r:1.78,inc:-0.55,n:5},{r:1.65,inc:0.95,n:5}];
  ORB.forEach(o=>{for(let i=0;i<o.n;i++){const a=i/o.n*2*Math.PI+o.r;let x=Math.cos(a)*o.r,z=Math.sin(a)*o.r,y=0;
    const c=Math.cos(o.inc),s=Math.sin(o.inc);spos.push(x,y*c-z*s,y*s+z*c);}});
  const vs=`attribute vec3 pos;uniform mat4 uMVP;uniform float uPS;varying float vz;
    void main(){vec4 p=uMVP*vec4(pos,1.0);gl_Position=p;vz=p.z/p.w;gl_PointSize=uPS/p.w;}`;
  const fs=`precision mediump float;uniform float uMode;uniform float uKind;varying float vz;
    void main(){float b=clamp(0.65-vz*0.4,0.26,1.0);
      vec2 d=gl_PointCoord-vec2(0.5);float r=dot(d,d);if(r>0.25)discard;
      float a=smoothstep(0.25,0.0,r);
      if(uKind>1.5){gl_FragColor=vec4(0.42,0.55,0.9,a*(0.42+0.35*b));}      // 经纬网格点
      else if(uKind>0.5){gl_FragColor=vec4(0.55,1.0,1.0,a*(0.85+0.15*b));} // 卫星
      else{vec3 c=mix(vec3(0.66,0.76,1.0),vec3(0.85,0.97,1.0),b);gl_FragColor=vec4(c,a*(0.85+0.15*b));}}`;
  function sh(t,s){const o=gl.createShader(t);gl.shaderSource(o,s);gl.compileShader(o);
    if(!gl.getShaderParameter(o,gl.COMPILE_STATUS))console.warn('globe shader:',gl.getShaderInfoLog(o));return o;}
  const pr=gl.createProgram();gl.attachShader(pr,sh(gl.VERTEX_SHADER,vs));gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(pr);if(!gl.getProgramParameter(pr,gl.LINK_STATUS))console.warn('globe link:',gl.getProgramInfoLog(pr));
  gl.useProgram(pr);
  function fbuf(arr){const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(arr),gl.STATIC_DRAW);return b;}
  const wB=fbuf(wpos),pB=fbuf(ppos),sB=fbuf(spos);
  const wIB=gl.createBuffer();gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,wIB);gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,new Uint16Array(widx),gl.STATIC_DRAW);
  const aPos=gl.getAttribLocation(pr,'pos'),uMVP=gl.getUniformLocation(pr,'uMVP'),uPS=gl.getUniformLocation(pr,'uPS'),
        uMode=gl.getUniformLocation(pr,'uMode'),uKind=gl.getUniformLocation(pr,'uKind');
  gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
  const DPR=Math.min(devicePixelRatio||1,1.75);let W,H;
  function resize(){W=cv.width=Math.floor(innerWidth*DPR);H=cv.height=Math.floor(innerHeight*DPR);gl.viewport(0,0,W,H);}
  resize();addEventListener('resize',resize);
  let dragY=0.5,tilt=-0.32,autoG=0,autoS=0,zoom=3.1,drag=false,lx=0,ly=0;
  cv.style.pointerEvents='auto';
  cv.addEventListener('pointerdown',e=>{drag=true;lx=e.clientX;ly=e.clientY;try{cv.setPointerCapture(e.pointerId);}catch(_){}});
  cv.addEventListener('pointermove',e=>{if(!drag)return;dragY+=(e.clientX-lx)*0.006;tilt+=(e.clientY-ly)*0.006;tilt=Math.max(-1.4,Math.min(1.4,tilt));lx=e.clientX;ly=e.clientY;});

  cv.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(2.4,Math.min(6.0,zoom+(e.deltaY>0?0.3:-0.3)));},{passive:false});
  function ident(){const o=new Float32Array(16);o[0]=o[5]=o[10]=o[15]=1;return o;}
  function mul(a,b){const o=new Float32Array(16);for(let c=0;c<4;c++)for(let r=0;r<4;r++){let s=0;for(let k=0;k<4;k++)s+=a[k*4+r]*b[c*4+k];o[c*4+r]=s;}return o;}
  function persp(f,as,n,fa){const t=1/Math.tan(f/2),o=new Float32Array(16);o[0]=t/as;o[5]=t;o[10]=(fa+n)/(n-fa);o[11]=-1;o[14]=2*fa*n/(n-fa);return o;}
  function rY(a){const c=Math.cos(a),s=Math.sin(a),o=ident();o[0]=c;o[2]=-s;o[8]=s;o[10]=c;return o;}
  function rX(a){const c=Math.cos(a),s=Math.sin(a),o=ident();o[5]=c;o[6]=s;o[9]=-s;o[10]=c;return o;}
  function draw(buf,mode,kind,ps,count,elem){
    gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.enableVertexAttribArray(aPos);gl.vertexAttribPointer(aPos,3,gl.FLOAT,false,0,0);
    gl.uniform1f(uMode,mode);gl.uniform1f(uKind,kind);gl.uniform1f(uPS,ps);
    if(elem){gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,wIB);gl.drawElements(gl.LINES,count,gl.UNSIGNED_SHORT,0);}
    else gl.drawArrays(gl.POINTS,0,count);}
  function frame(){
    if(!drag)autoG+=0.0011; autoS+=0.006;
    const view=ident();view[13]=-0.35;view[14]=-zoom;
    const proj=persp(0.95,W/H,0.1,100);
    const mvpG=mul(proj,mul(view,mul(rY(dragY+autoG),rX(tilt))));
    const mvpS=mul(proj,mul(view,mul(rY(dragY+autoS),rX(tilt))));
    gl.clear(gl.COLOR_BUFFER_BIT);gl.useProgram(pr);
    gl.uniformMatrix4fv(uMVP,false,mvpG);
    draw(wB,0.0,2.0,H*0.005,wpos.length/3,false);   // 经纬网格点（密集小点组成线）
    draw(pB,0.0,0.0,H*0.014,CP,false);               // 客户光点
    gl.uniformMatrix4fv(uMVP,false,mvpS);
    draw(sB,0.0,1.0,H*0.022,spos.length/3,false);    // 轨道卫星
    requestAnimationFrame(frame);}
  requestAnimationFrame(frame);
})();
</script>
