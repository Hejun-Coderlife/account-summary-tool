<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浅色背景方案 · 挑一个</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    background:#eef1f7;color:#2a3050;min-height:100vh;padding:22px 22px 40px;-webkit-font-smoothing:antialiased;}
  h1{font-size:20px;font-weight:800;letter-spacing:1px;text-align:center;color:#3a4270;}
  .sub{text-align:center;color:#6b7395;font-size:13px;margin:8px 0 22px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:1280px;margin:0 auto;}
  @media(max-width:760px){.grid{grid-template-columns:1fr;}}
  .tile{position:relative;border-radius:16px;overflow:hidden;aspect-ratio:16/9;cursor:pointer;background:#f4f6fc;
    border:1px solid #dfe4f2;box-shadow:0 12px 30px rgba(60,80,160,.14);
    transition:transform .18s,box-shadow .18s,border-color .18s;}
  .tile:hover{transform:translateY(-4px);border-color:#b9c6f0;box-shadow:0 20px 46px rgba(60,90,200,.22);}
  .tile canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .tile .meta{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:14px 16px;
    background:linear-gradient(180deg,transparent,rgba(255,255,255,.82));pointer-events:none;}
  .tile .tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:1px;color:#fff;
    background:linear-gradient(135deg,#6aa8ff,#a78bff);border-radius:6px;padding:2px 9px;margin-bottom:7px;}
  .tile .name{font-size:16px;font-weight:800;color:#2a3050;}
  .tile .desc{font-size:12px;color:#5a6288;margin-top:3px;}
  .tile .expand{position:absolute;top:12px;right:14px;z-index:2;font-size:11px;color:#3a4270;
    background:rgba(255,255,255,.75);border:1px solid #cbd4ee;border-radius:999px;padding:4px 11px;
    opacity:0;transition:.18s;pointer-events:none;}
  .tile:hover .expand{opacity:1;}
  .tile .err{position:absolute;inset:0;z-index:3;display:flex;align-items:center;justify-content:center;
    padding:18px;background:#fff;color:#b02a37;font-size:12px;line-height:1.5;text-align:center;
    white-space:pre-wrap;overflow:auto;}
  .tile.full{position:fixed;inset:0;z-index:100;aspect-ratio:auto;border-radius:0;border:none;transform:none;margin:0;}
  .tile.full .expand{opacity:1;font-size:13px;padding:8px 16px;}
  .hint{text-align:center;color:#8990b5;font-size:12px;margin-top:22px;}
  .hint b{color:#4a5488;}
</style>
</head>
<body>
  <h1>浅色动态背景 · 4 个图案方案</h1>
  <div class="sub">点任意一个可全屏细看，再点一次（或按 Esc）返回。选好告诉我「要浅几」，我就装到账目汇总工具上。</div>
  <div class="grid" id="grid"></div>
  <div class="hint">全部 <b>WebGL / GPU</b> 手写图案着色器、已限制渲染分辨率 · 仅预览，<b>不会改动你的网站</b></div>

<script>
const SCENES=[
  {tag:'浅 1',name:'波点涟漪',desc:'彩色圆点阵，一圈圈涟漪向外扩散'},
  {tag:'浅 2',name:'流动等高线',desc:'地形等高线般细密线条缓缓流动'},
  {tag:'浅 3',name:'三角拼块',desc:'低多边形三角马赛克，色块轻轻呼吸'},
  {tag:'浅 4',name:'蜂巢脉动',desc:'六边形蜂窝网格，光波一圈圈脉动'},
];

/* ===== WebGL 帮手（编译/链接失败会 throw，方便定位） ===== */
function sh(gl,t,src){const o=gl.createShader(t);gl.shaderSource(o,src);gl.compileShader(o);
  if(!gl.getShaderParameter(o,gl.COMPILE_STATUS))throw new Error((t===gl.VERTEX_SHADER?'顶点':'片元')+'着色器编译失败:\n'+gl.getShaderInfoLog(o));
  return o;}
function prog(gl,vs,fs){const p=gl.createProgram();gl.attachShader(p,sh(gl,gl.VERTEX_SHADER,vs));gl.attachShader(p,sh(gl,gl.FRAGMENT_SHADER,fs));gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS))throw new Error('着色器链接失败:\n'+gl.getProgramInfoLog(p));return p;}
function sizer(cv,gl){return function(){const dpr=Math.min(devicePixelRatio||1,1.4);
  const w=Math.max(1,Math.floor(cv.clientWidth*dpr)),h=Math.max(1,Math.floor(cv.clientHeight*dpr));
  if(cv.width!==w||cv.height!==h){cv.width=w;cv.height=h;}gl.viewport(0,0,cv.width,cv.height);};}

/* 全屏片元 shader 启动器：返回 resize 函数 */
function runFS(cv,fsBody){
  let gl;try{gl=cv.getContext('webgl',{alpha:false,antialias:false})||cv.getContext('experimental-webgl');}catch(e){}
  if(!gl)throw new Error('浏览器不支持 WebGL');
  const vs='attribute vec2 p;void main(){gl_Position=vec4(p,0.0,1.0);}';
  const fs='precision mediump float;uniform vec2 uRes;uniform float uT;\n'+fsBody;
  const pr=prog(gl,vs,fs);
  const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
  const aP=gl.getAttribLocation(pr,'p'),uRes=gl.getUniformLocation(pr,'uRes'),uT=gl.getUniformLocation(pr,'uT');
  const resize=sizer(cv,gl);resize();const t0=performance.now();
  function loop(now){resize();gl.useProgram(pr);gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.enableVertexAttribArray(aP);gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);
    gl.uniform2f(uRes,cv.width,cv.height);gl.uniform1f(uT,(now-t0)/1000);
    gl.drawArrays(gl.TRIANGLES,0,3);requestAnimationFrame(loop);}
  requestAnimationFrame(loop);
  return resize;
}

const NOISE=
  'float hash(vec2 p){p=fract(p*vec2(123.34,345.45));p+=dot(p,p+34.345);return fract(p.x*p.y);}'+
  'float noise(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.0-2.0*f);'+
  'float a=hash(i),b=hash(i+vec2(1.0,0.0)),c=hash(i+vec2(0.0,1.0)),d=hash(i+vec2(1.0,1.0));'+
  'return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}'+
  'float fbm(vec2 p){float v=0.0,a=0.5;mat2 m=mat2(1.6,1.2,-1.2,1.6);'+
  'for(int i=0;i<5;i++){v+=a*noise(p);p=m*p;a*=0.5;}return v;}';

/* ===== 浅1：波点涟漪 —— 圆点阵 + 同心波脉动 ===== */
function initDots(cv){return runFS(cv,
  'void main(){vec2 uv=gl_FragCoord.xy/uRes.y;'+
  'vec2 ctr=vec2(uRes.x/uRes.y*0.5,0.5);'+
  'vec3 col=vec3(0.975,0.982,1.0);'+
  'float cell=0.048;'+
  'vec2 idc=(floor(uv/cell)+0.5)*cell;'+
  'vec2 f=uv-idc;'+
  'float d=length(idc-ctr);'+
  'float wave=0.5+0.5*sin(d*9.0-uT*2.4);'+
  'float rad=(0.16+0.32*wave)*cell;'+
  'float m=smoothstep(rad,rad*0.5,length(f));'+
  'vec3 dc=mix(vec3(0.34,0.60,1.0),vec3(0.80,0.48,1.0),wave);'+
  'col=mix(col,dc,m*0.92);'+
  'gl_FragColor=vec4(col,1.0);}');}

/* ===== 浅2：流动等高线 —— fbm 高度场等高线 ===== */
function initContour(cv){return runFS(cv, NOISE+
  'void main(){vec2 uv=gl_FragCoord.xy/uRes.y;'+
  'float h=fbm(uv*2.3+vec2(uT*0.05,uT*0.03));'+
  'vec3 col=mix(vec3(0.92,0.98,0.95),vec3(0.70,0.90,0.80),h);'+
  'float e=abs(fract(h*10.0-uT*0.28)-0.5);'+
  'float line=smoothstep(0.42,0.5,e);'+
  'col=mix(col,vec3(0.08,0.58,0.44),line*0.55);'+
  'float e2=abs(fract(h*10.0-uT*0.28+0.5)-0.5);'+
  'col=mix(col,vec3(0.42,0.80,0.64),smoothstep(0.47,0.5,e2)*0.25);'+
  'gl_FragColor=vec4(col,1.0);}');}

/* ===== 浅3：三角拼块 —— 三角剖分马赛克呼吸 ===== */
function initTri(cv){return runFS(cv,
  'void main(){vec2 uv=gl_FragCoord.xy/uRes.y*7.0;'+
  'uv.x+=uv.y*0.5;'+
  'vec2 id=floor(uv);vec2 f=fract(uv);'+
  'float up=step(1.0,f.x+f.y);'+
  'float hh=fract(sin(dot(id,vec2(12.9,78.2))+up*37.13)*43758.5);'+
  'float shade=0.5+0.5*sin(uT*0.9+hh*6.283+id.x*0.25+id.y*0.2);'+
  'vec3 col=mix(vec3(1.0,0.85,0.66),vec3(1.0,0.71,0.80),hh);'+
  'col=mix(col,vec3(1.0,0.90,0.58),0.35*sin(hh*9.0)*sin(hh*9.0));'+
  'col*=0.82+0.20*shade;'+
  'float edge=min(min(f.x,f.y),abs(f.x+f.y-1.0));'+
  'col=mix(vec3(1.0),col,0.25+0.75*smoothstep(0.0,0.04,edge));'+
  'gl_FragColor=vec4(clamp(col,0.0,1.0),1.0);}');}

/* ===== 浅4：蜂巢脉动 —— 六边形网格 + 光波 ===== */
function initHex(cv){return runFS(cv,
  'void main(){vec2 uv=gl_FragCoord.xy/uRes.y*6.0;'+
  'vec2 s=vec2(1.0,1.7320508);vec2 hs=0.5*s;'+
  'vec2 a=mod(uv,s)-hs;vec2 b=mod(uv+hs,s)-hs;'+
  'vec2 gv=dot(a,a)<dot(b,b)?a:b;'+
  'vec2 id=uv-gv;'+
  'vec2 ctr=vec2(uRes.x/uRes.y*3.0,3.0);'+
  'float hd=max(abs(gv.x)*0.8660254+abs(gv.y)*0.5,abs(gv.y));'+
  'float pulse=0.5+0.5*sin(uT*1.6-length(id-ctr)*1.1);'+
  'vec3 fillc=mix(vec3(0.93,0.985,1.0),mix(vec3(0.26,0.82,0.94),vec3(0.40,0.68,1.0),pulse),pulse*0.55);'+
  'float edge=smoothstep(0.46,0.5,hd);'+
  'vec3 col=mix(fillc,vec3(0.18,0.70,0.86),edge*0.6);'+
  'gl_FragColor=vec4(col,1.0);}');}

const INITS=[initDots,initContour,initTri,initHex];
const grid=document.getElementById('grid');
const resizers=[];
SCENES.forEach((s,idx)=>{
  const tile=document.createElement('div');tile.className='tile';
  tile.innerHTML='<canvas></canvas>'+
    '<div class="expand">⤢ 全屏预览</div>'+
    '<div class="meta"><span class="tag">'+s.tag+'</span><div class="name">'+s.name+'</div><div class="desc">'+s.desc+'</div></div>';
  grid.appendChild(tile);
  const cv=tile.querySelector('canvas');
  tile.addEventListener('click',()=>{
    const wasFull=tile.classList.contains('full');
    document.querySelectorAll('.tile.full').forEach(t=>t.classList.remove('full'));
    if(!wasFull)tile.classList.add('full');
    requestAnimationFrame(()=>resizers.forEach(fn=>fn()));
  });
  try{
    const r=INITS[idx](cv);
    if(typeof r==='function')resizers.push(r);
  }catch(err){
    const d=document.createElement('div');d.className='err';
    d.textContent='方案'+(idx+1)+' 渲染失败：\n'+((err&&err.message)||err);
    tile.appendChild(d);console.error('scene',idx+1,err);
  }
});
addEventListener('keydown',e=>{if(e.key==='Escape'){document.querySelectorAll('.tile.full').forEach(t=>t.classList.remove('full'));requestAnimationFrame(()=>resizers.forEach(fn=>fn()));}});
addEventListener('resize',()=>resizers.forEach(fn=>fn()));
</script>
</body>
</html>
