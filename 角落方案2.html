<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>角落装饰 · 真实齿轮 6 款</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    background:#0a0d18;color:#dbe6f5;-webkit-font-smoothing:antialiased;padding:22px 18px 60px;}
  .pgh{text-align:center;font-size:19px;font-weight:800;letter-spacing:1px;color:#cfe0ff;}
  .pgs{text-align:center;color:#8090b5;font-size:13px;margin:8px 0 26px;}
  .vrow{max-width:1000px;margin:0 auto 34px;text-align:center;}
  .vtag{display:inline-block;margin:0 auto 10px;font-size:12px;font-weight:700;letter-spacing:2px;color:#0a0d18;
    background:linear-gradient(135deg,#8fd8ff,#c6a6ff);border-radius:999px;padding:4px 14px;}
  .panel{position:relative;overflow:hidden;height:450px;border-radius:18px;border:1px solid #dfe4f0;
    background:radial-gradient(125% 90% at 50% 0%,#eef2f8,#e6ebf4 65%,#dfe5f0);box-shadow:0 20px 50px rgba(0,0,0,.45);}
  .fakecard{position:absolute;top:38px;left:50%;transform:translateX(-50%);width:72%;height:160px;
    background:#fff;border:1px solid #e0e5ee;border-radius:14px;box-shadow:0 14px 36px rgba(51,65,85,.10);
    display:flex;align-items:center;justify-content:center;color:#aab3c6;font-size:14px;z-index:2;}
  .cornerL,.cornerR{position:absolute;bottom:0;width:0;height:0;z-index:1;pointer-events:none;}
  .cornerL{left:0;} .cornerR{right:0;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .pgend{text-align:center;color:#66799b;font-size:12px;margin-top:10px;}
  .pgend b{color:#9fc4f0;}
</style>
</head>
<body>
  <div class="pgh">角落装饰 · 真实齿轮 6 款</div>
  <div class="pgs">程序化真实齿轮：梯形轮齿 + 金属质感 + 轴孔/减重孔，成对咬合传动。左右两角不对称。</div>
  <div id="host"></div>
  <div class="pgend">纯 SVG + CSS，省性能 · 仅预览，<b>不会改动你的网站</b></div>

<script>
let GI=0;
function pos(o){return 'position:absolute;'+(o.side==='R'?'right:':'left:')+o.x+'px;bottom:'+o.bottom+'px;';}
function anim(o){return o.dur?('animation:spin '+o.dur+'s linear infinite'+(o.rev?' reverse':'')+';transform-origin:center;'):'';}
// 真实齿轮：梯形轮齿 + 金属渐变 + 轴孔 + 减重孔（evenodd 挖空）
function gear(o){
  const id='g'+(GI++),cx=50,cy=50,R=46,t=o.t||7,Rr=R-t,N=o.N||18,step=2*Math.PI/N;
  const P=(r,a)=>((cx+r*Math.cos(a)).toFixed(2)+' '+(cy+r*Math.sin(a)).toFixed(2));
  let d='';
  for(let i=0;i<N;i++){const a=i*step-Math.PI/2;
    const a1=a,a2=a+step*0.30,a3=a+step*0.30+step*0.16,a4=a+step*0.70,a5=a+step;
    d+=(i===0?'M':'L')+P(R,a1)+'L'+P(R,a2)+'L'+P(Rr,a3)+'L'+P(Rr,a4)+'L'+P(R,a5);}
  d+='Z';
  const bore=o.bore||13;
  d+=' M'+(cx+bore)+' '+cy+' A'+bore+' '+bore+' 0 1 0 '+(cx-bore)+' '+cy+' A'+bore+' '+bore+' 0 1 0 '+(cx+bore)+' '+cy+'Z';
  if(o.holes){const hn=o.holes,hr=o.holeR||6,hd=(bore+Rr)/2;
    for(let i=0;i<hn;i++){const ang=i/hn*2*Math.PI-Math.PI/2,hx=cx+Math.cos(ang)*hd,hy=cy+Math.sin(ang)*hd;
      d+=' M'+(hx+hr)+' '+hy+' A'+hr+' '+hr+' 0 1 0 '+(hx-hr).toFixed(2)+' '+hy+' A'+hr+' '+hr+' 0 1 0 '+(hx+hr).toFixed(2)+' '+hy+'Z';}}
  const grad='<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0.9" y2="1"><stop offset="0" stop-color="'+o.c1+'"/><stop offset=".5" stop-color="'+o.c2+'"/><stop offset="1" stop-color="'+o.c3+'"/></linearGradient></defs>';
  const hub='<circle cx="50" cy="50" r="'+(bore+4)+'" fill="none" stroke="'+o.c3+'" stroke-width="1.3" opacity=".45"/>'+
    '<circle cx="50" cy="50" r="'+(Rr-1.5)+'" fill="none" stroke="'+o.c3+'" stroke-width="0.8" opacity=".4"/>';
  return '<svg style="'+pos(o)+'width:'+o.sz+'px;height:'+o.sz+'px;opacity:'+(o.op||0.8)+';'+anim(o)+'" viewBox="0 0 100 100">'+grad+
    '<path d="'+d+'" fill="url(#'+id+')" fill-rule="evenodd" stroke="'+o.c3+'" stroke-width="0.7" stroke-linejoin="round"/>'+hub+'</svg>';}
function ring(o){return '<svg style="'+pos(o)+'width:'+o.sz+'px;height:'+o.sz+'px;opacity:'+(o.op||0.4)+';'+anim(o)+'" viewBox="0 0 100 100">'+
  '<circle cx="50" cy="50" r="'+(o.r||44)+'" fill="none" stroke="'+o.col+'" stroke-width="'+(o.sw||1.4)+'" stroke-dasharray="'+(o.dash||'3 4')+'"/></svg>';}
function disc(o){const id='d'+(GI++);
  return '<svg style="'+pos(o)+'width:'+o.sz+'px;height:'+o.sz+'px;opacity:'+(o.op||0.5)+';'+anim(o)+'" viewBox="0 0 100 100">'+
  '<defs><radialGradient id="'+id+'" cx=".4" cy=".33" r=".75"><stop offset="0" stop-color="'+o.c1+'"/><stop offset="1" stop-color="'+o.c3+'"/></radialGradient></defs>'+
  '<circle cx="50" cy="50" r="46" fill="url(#'+id+')" stroke="'+o.c3+'" stroke-width="0.8"/>'+
  '<circle cx="50" cy="50" r="'+(o.inner||30)+'" fill="none" stroke="'+o.c3+'" stroke-width="1" opacity=".5"/></svg>';}
function bolts(o){let c='';for(let i=0;i<o.n;i++){const a=i/o.n*6.2832-Math.PI/2,x=50+Math.cos(a)*o.r,y=50+Math.sin(a)*o.r;
    c+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+(o.rr||2.6)+'" fill="'+o.col+'"/>';}
  return '<svg style="'+pos(o)+'width:'+o.sz+'px;height:'+o.sz+'px;opacity:'+(o.op||0.6)+';'+anim(o)+'" viewBox="0 0 100 100">'+c+'</svg>';}

const S1={c1:'#eef3fa',c2:'#a8b8d2',c3:'#5c7096'},S2={c1:'#dbe4f0',c2:'#8a9cba',c3:'#4a5e84'},S3={c1:'#c8d3e4',c2:'#7688a8',c3:'#3f527a'};
const B1={c1:'#f5e8bd',c2:'#cda94e',c3:'#8c6c22'},B2={c1:'#ecdfb0',c2:'#c19c40',c3:'#7d5f1c'};
function G(o,pal){return gear(Object.assign({},pal,o));}

const VARIANTS=[
  {name:'真实 1 · 双齿咬合',
   L:()=>G({side:'L',sz:360,x:-180,bottom:-180,N:26,dur:26,op:.82},S1)+G({side:'L',sz:220,x:80,bottom:80,N:16,dur:16,rev:1,holes:5,holeR:6,op:.85},S2),
   R:()=>G({side:'R',sz:250,x:-125,bottom:-125,N:22,dur:22,rev:1,op:.82},S1)+G({side:'R',sz:150,x:55,bottom:55,N:12,dur:12,holes:4,holeR:6,op:.85},S3)},
  {name:'真实 2 · 三齿传动',
   L:()=>G({side:'L',sz:330,x:-165,bottom:-165,N:28,dur:28,op:.82},S1)+G({side:'L',sz:205,x:74,bottom:74,N:18,dur:18,rev:1,holes:5,op:.85},S2)+G({side:'L',sz:135,x:250,bottom:52,N:12,dur:12,holes:4,op:.85},S3),
   R:()=>G({side:'R',sz:230,x:-115,bottom:-115,N:20,dur:20,rev:1,op:.82},S1)+G({side:'R',sz:160,x:66,bottom:66,N:14,dur:14,holes:4,op:.85},S2)},
  {name:'真实 3 · 精密轮辐',
   L:()=>G({side:'L',sz:420,x:-210,bottom:-210,N:34,dur:34,holes:6,holeR:8,op:.82},S1),
   R:()=>G({side:'R',sz:270,x:-135,bottom:-135,N:26,dur:26,rev:1,holes:6,holeR:7,op:.82},S2)},
  {name:'真实 4 · 法兰螺栓',
   L:()=>disc({side:'L',sz:320,x:-160,bottom:-160,op:.5},S3)+bolts({side:'L',sz:320,x:-160,bottom:-160,n:14,r:38,col:'#3f527a',rr:2.6,op:.55})+G({side:'L',sz:200,x:-100,bottom:-100,N:18,dur:20,holes:5,op:.85},S1),
   R:()=>disc({side:'R',sz:210,x:-70,bottom:-55,op:.5},S3)+bolts({side:'R',sz:210,x:-70,bottom:-55,n:10,r:38,col:'#3f527a',rr:2.4,op:.55})+G({side:'R',sz:140,x:-42,bottom:-30,N:14,dur:15,rev:1,holes:4,op:.85},S1)},
  {name:'真实 5 · 行星齿轮',
   L:()=>ring({side:'L',sz:300,x:-70,bottom:-70,r:44,col:'#5c7096',sw:5,dash:'2 3',op:.5,dur:120})+
     G({side:'L',sz:110,x:95,bottom:95,N:12,dur:12,op:.85},S1)+
     G({side:'L',sz:78,x:150,bottom:120,N:9,dur:9,rev:1,op:.85},S2)+
     G({side:'L',sz:78,x:60,bottom:150,N:9,dur:9,rev:1,op:.85},S2)+
     G({side:'L',sz:78,x:105,bottom:38,N:9,dur:9,rev:1,op:.85},S2),
   R:()=>G({side:'R',sz:120,x:60,bottom:70,N:12,dur:12,op:.85},S1)+
     G({side:'R',sz:80,x:120,bottom:96,N:9,dur:9,rev:1,op:.85},S2)+
     G({side:'R',sz:80,x:36,bottom:34,N:9,dur:9,rev:1,op:.85},S2)},
  {name:'真实 6 · 黄铜细齿',
   L:()=>G({side:'L',sz:340,x:-170,bottom:-170,N:46,t:4.5,dur:40,holes:6,holeR:7,op:.8},B1)+G({side:'L',sz:200,x:70,bottom:70,N:30,t:4,dur:26,rev:1,holes:5,op:.85},B2),
   R:()=>G({side:'R',sz:230,x:-115,bottom:-115,N:36,t:4.5,dur:30,rev:1,op:.8},B1)+G({side:'R',sz:150,x:60,bottom:60,N:24,t:4,dur:20,holes:4,op:.85},B2)},
];

const host=document.getElementById('host');
VARIANTS.forEach(v=>{
  const row=document.createElement('div');row.className='vrow';
  row.innerHTML='<div class="vtag">'+v.name+'</div>'+
    '<div class="panel"><div class="fakecard">内容卡片区（示意）</div>'+
    '<div class="cornerL">'+v.L()+'</div><div class="cornerR">'+v.R()+'</div></div>';
  host.appendChild(row);
});
</script>
</body>
</html>
